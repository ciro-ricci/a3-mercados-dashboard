<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A3 Mercados — Noticias</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f0f2f5;
  color: #1a1a2e;
  min-height: 100vh;
}

/* ── Header ── */
.header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  color: white;
  padding: 18px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}
.header-left h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: 0.5px; }
.header-left .sub { font-size: 0.75rem; opacity: 0.55; margin-top: 3px; }
.header-right { text-align: right; }
.header-right .update-label { font-size: 0.68rem; opacity: 0.45; }
.header-right .update-date  { font-size: 0.8rem; opacity: 0.75; margin-top: 2px; }

/* ── Barra de filtros ── */
.filter-bar {
  background: #16213e;
  padding: 10px 24px;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.filter-chip {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.15);
  background: transparent;
  color: rgba(255,255,255,0.5);
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.filter-chip:hover { color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.35); }
.filter-chip.active               { background: #4ecdc4; color: #1a1a2e; border-color: #4ecdc4; }
.filter-chip.chip-trigo.active    { background: #fcd34d; color: #1a1a2e; border-color: #fcd34d; }
.filter-chip.chip-maiz.active     { background: #86efac; color: #1a1a2e; border-color: #86efac; }
.filter-chip.chip-soja.active     { background: #93c5fd; color: #1a1a2e; border-color: #93c5fd; }
.filter-count { margin-left: auto; font-size: 0.72rem; color: rgba(255,255,255,0.3); }

/* ── Contenido ── */
.content {
  padding: 20px 24px;
  max-width: 780px;
  margin: 0 auto;
}
@media (max-width: 600px) { .content { padding: 14px 12px; } }

/* ── Estado vacío ── */
.empty-state { text-align: center; padding: 60px 20px; color: #aaa; }
.empty-state .icon { font-size: 2.8rem; margin-bottom: 12px; }
.empty-state p { font-size: 0.88rem; }

/* ── Lista de noticias (columna única) ── */
.news-list { display: flex; flex-direction: column; gap: 14px; }

/* ── Card ── */
.news-card {
  background: white;
  border-radius: 12px;
  padding: 18px 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  display: flex;
  flex-direction: column;
  gap: 10px;
  border-left: 4px solid #e8eaed;
  transition: box-shadow 0.15s, transform 0.1s;
}
.news-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.10); transform: translateY(-1px); }
.news-card.c-trigo { border-left-color: #f59e0b; }
.news-card.c-maiz  { border-left-color: #22c55e; }
.news-card.c-soja  { border-left-color: #3b82f6; }
.news-card.c-multi { border-left-color: #8b5cf6; }

/* ── Meta de la card ── */
.card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.card-fecha { font-size: 0.72rem; color: #999; white-space: nowrap; }
.card-fuente {
  font-size: 0.72rem; font-weight: 700;
  background: #f0f2f5; color: #444;
  padding: 2px 9px; border-radius: 20px; white-space: nowrap;
}
.card-cultivo {
  font-size: 0.7rem; font-weight: 700;
  padding: 2px 9px; border-radius: 20px; white-space: nowrap;
}
.tag-trigo { background: #fef3c7; color: #92400e; }
.tag-maiz  { background: #dcfce7; color: #166534; }
.tag-soja  { background: #dbeafe; color: #1e3a8a; }
.tag-multi { background: #ede9fe; color: #4c1d95; }
.tag-gen   { background: #f3f4f6; color: #6b7280; }

.age-badge { font-size: 0.68rem; color: #bbb; margin-left: auto; white-space: nowrap; }
.age-badge.fresh { color: #16a34a; font-weight: 700; }

/* ── Cuerpo ── */
.card-titulo {
  font-size: 0.92rem;
  font-weight: 700;
  line-height: 1.45;
  color: #1a1a2e;
}
.card-resumen {
  font-size: 0.82rem;
  color: #4b5563;
  line-height: 1.65;
}

/* ── Footer ── */
.card-footer { padding-top: 2px; }
.btn-ver-nota {
  display: inline-block;
  background: #1a1a2e;
  color: white;
  font-size: 0.78rem;
  font-weight: 600;
  padding: 7px 18px;
  border-radius: 8px;
  text-decoration: none;
  transition: background 0.15s;
  font-family: inherit;
}
.btn-ver-nota:hover { background: #2d3a5e; }

/* ── Separador de fecha ── */
.date-divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 6px 0 2px;
  color: #9ca3af;
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.6px;
}
.date-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #e5e7eb;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>📰 Noticias del campo</h1>
    <div class="sub">🌾 Trigo · 🌽 Maíz · 🫘 Soja — últimos 7 días</div>
  </div>
  <div class="header-right">
    <div class="update-label">🔄 Última actualización</div>
    <div class="update-date" id="update-date">—</div>
  </div>
</div>

<div class="filter-bar">
  <button class="filter-chip active"     onclick="setFilter('todos')" id="chip-todos">🌿 Todos</button>
  <button class="filter-chip chip-trigo" onclick="setFilter('trigo')" id="chip-trigo">🌾 Trigo</button>
  <button class="filter-chip chip-maiz"  onclick="setFilter('maiz')"  id="chip-maiz">🌽 Maíz</button>
  <button class="filter-chip chip-soja"  onclick="setFilter('soja')"  id="chip-soja">🫘 Soja</button>
  <span class="filter-count" id="filter-count"></span>
</div>

<div class="content">
  <div id="news-container"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════
   NEWS_DATA — Claude actualiza este bloque cada vez que corre el scraping.
   Las noticias con más de 7 días son eliminadas automáticamente del array.
   Última actualización: 2026-07-04
   ═══════════════════════════════════════════════════════════════════════ */
const NEWS_DATA = [
  {fecha:'2026-07-02',fuente:'Bolsa de Cereales de Entre Ríos',cultivo:'Trigo',titulo:'La siembra de trigo en Entre Ríos avanza al 79% pero la intención para 2026/27 caería 18%',resumen:'El Informe Semanal N°1238 de BolsaCER ubicó el avance de siembra de trigo provincial en 79%, 14 puntos por encima de hace 15 días y 12 puntos por sobre el promedio de los últimos cinco años, tras las demoras por exceso de humedad en la costa del Paraná. Para el ciclo 2026/27 la intención de siembra se estima en 600.000 hectáreas, una baja interanual cercana al 18%, aunque la reciente caída del precio de los fertilizantes nitrogenados podría atenuarla antes del cierre de la ventana, que rara vez se extiende más allá del 10 de julio.',link:'https://bolsacer.org.ar/site/siber/informe-semanal-n-1238/'},
  {fecha:'2026-07-02',fuente:'Bolsa de Cereales',cultivo:'Trigo / Maíz / Soja',titulo:'Heladas generalizadas pero escasas lluvias para el agro en la primera semana de julio',resumen:'El informe semanal de perspectivas agroclimáticas de la Bolsa de Cereales anticipó el ingreso de una masa de aire polar que provocará heladas generalizadas en el oeste del país entre el 2 y el 8 de julio, con precipitaciones escasas (menos de 10 mm) en casi toda el área agrícola salvo el extremo norte de la Mesopotamia. Las temperaturas mínimas caerán por debajo de 0°C en el oeste y centro del NOA, el oeste y centro de Cuyo y el sudoeste de la región pampeana, mientras que hacia el 9 de julio se prevé un rápido retorno de aire cálido antes de una nueva entrada polar hacia el cierre del período.',link:'https://bankmagazine.com.ar/heladas-generalizadas/'},
  {fecha:'2026-07-01',fuente:'Bichos de Campo',cultivo:'Maíz / Soja',titulo:'Un modelo climático basado en IA proyecta menos lluvias que los modelos tradicionales en zonas clave de maíz y soja de EEUU',resumen:'Según la consultora CropProphet, el sistema de IA AIFS del Centro Europeo de Previsiones Meteorológicas proyecta que solo 65% del área maicera y 71% de la sojera clave de EEUU recibirán lluvias normales en las próximas dos semanas, frente a un escenario cercano a lo normal (97%-109%) que muestran los modelos tradicionales IFS-ECMWF y GEFS. La divergencia se da en pleno mercado climático estadounidense y ya se refleja en subas intradiarias de los futuros de maíz y soja en Chicago.',link:'https://bichosdecampo.com/a-quien-le-creemos-un-modelo-gestionado-por-inteligencia-artificial-predice-un-escenario-muy-diferente-al-proyectado-por-humanos-en-las-principales-zonas-agricolas-de-ee-uu/'},
  {fecha:'2026-07-01',fuente:'LA NACION',cultivo:'Soja',titulo:'Buenas cosechas de soja en Brasil, EEUU y Argentina chocan con una demanda cautelosa de China',resumen:'En el seminario Acsoja 2026 de la BCR, analistas de Hedgepoint y FyO señalaron que el mercado mundial de soja está bien abastecido -con EEUU en 65% de condición buena a excelente y solo 22% del área bajo sequía- mientras China compra con cautela por menores stocks de carne de cerdo y aceite. En Argentina, a principios de julio apenas el 26% de la producción potencial de soja tiene precio fijado, con un rezago de ocho puntos porcentuales respecto del promedio histórico, y no se esperan repuntes importantes de precio en el corto plazo.',link:'https://www.lanacion.com.ar/economia/campo/combinacion-poco-alentadora-hay-muy-buenas-cosechas-de-soja-en-los-principales-exportadores-y-el-nid01072026/'},
  {fecha:'2026-07-01',fuente:'LA NACION',cultivo:'Trigo / Maíz / Soja',titulo:'La liquidación de divisas del agro cayó 13% en el primer semestre pese a mayores DJVE de trigo y maíz',resumen:'Según Ciara-CEC, la agroexportación liquidó US$13.378 millones entre enero y junio de 2026, un 13% menos que igual período de 2025 (unos US$2000 millones de diferencia), por menores precios internacionales y por no repetirse la rebaja temporal de retenciones vigente el año pasado. Las DJVE de granos y subproductos sumaron 48,2 millones de toneladas en el semestre frente a 39,1 Mt en 2025, traccionadas por maíz (+4,4 Mt) y trigo (+3,7 Mt), mientras el complejo soja retrocedió (poroto -525.000 t, harina -235.000 t, aceite -26.000 t).',link:'https://www.lanacion.com.ar/economia/campo/dolares-en-el-primer-semestre-del-ano-la-agroexportacion-liquido-un-13-menos-de-divisas-y-el-dato-nid01072026/'},
  {fecha:'2026-07-01',fuente:'Gear S.A.',cultivo:'Trigo / Maíz / Soja',titulo:'El Niño se perfila fuerte a muy fuerte para diciembre-enero, el mejor escenario productivo desde 2020',resumen:'El consultor de GEA/BCR Alfredo Elorriaga explicó que, pese a que la NOAA cambió el índice oceánico de referencia (de ONI a RONI) dificultando la comparación numérica, el evento El Niño sería fuerte y con chances de muy fuerte durante diciembre y enero, justo cuando se define el rendimiento del maíz temprano y la soja de primera. Las reservas de agua útil en la región pampeana se mantuvieron por encima de lo normal en al menos el 80% del área para el trimestre diciembre-febrero, configurando según el consultor «el escenario ideal para la producción agrícola», aunque con riesgo de lluvias excesivas durante la cosecha.',link:'https://gear-sa.com.ar/2026/07/01/que-pasa-con-el-nino-sin-datos-claros-pero-rumbo-a-un-escenario-de-alta-productividad/'},
  {fecha:'2026-06-30',fuente:'USDA - NASS',cultivo:'Trigo / Maíz / Soja',titulo:'EE.UU.: el USDA confirma 95,3 millones de acres de maíz y 85,4 millones de soja, con stocks trimestrales en alza',resumen:'El reporte de Área Sembrada y Stocks Trimestrales del USDA-NASS, publicado este 30 de junio, ubicó el área de maíz en EE.UU. en 95,3 millones de acres (-3% interanual), la de soja en 85,4 millones de acres (+5%) y la de trigo total en 42,7 millones de acres (-6%). Los stocks al 1 de junio resultaron en 5.290 millones de bushels de maíz (+14% i.a.), 1.060 millones de soja (+5%) y 920 millones de trigo (+8%), todos por encima del año pasado.',link:'https://www.nass.usda.gov/Newsroom/2026/06-30-2026.php'},
  {fecha:'2026-06-30',fuente:'Bichos de Campo',cultivo:'Trigo / Maíz',titulo:'La agroindustria argentina exportó un récord de 53 millones de toneladas entre enero y mayo',resumen:'Según la Secretaría de Agricultura, las exportaciones agroindustriales argentinas alcanzaron 53 Mt entre enero y mayo, un salto de 18% en volumen y 17% en valor (USD 22.383 millones) respecto a 2025. El trigo lideró entre los granos con subas de 64% en volumen y 48% en valor, mientras el maíz creció 12% en volumen y 8% en valor; de 54 complejos analizados, 35 mostraron crecimiento y explicaron cerca del 70% del volumen exportado.',link:'https://bichosdecampo.com/festeja-toto-la-agroindustria-marco-un-record-exportador-con-53-millones-de-toneladas-entre-enero-y-mayo/'},
  {fecha:'2026-06-30',fuente:'Bichos de Campo',cultivo:'Soja',titulo:'Las ventas de soja con precio hecho caen al 26% de la cosecha, uno de los niveles más bajos de la década',resumen:'En el Seminario AcSoja de la Bolsa de Comercio de Rosario, el analista de FYO Javier Treboux señaló que las ventas de soja con precio fijado alcanzan apenas 26% de la cosecha estimada 2025/26, uno de los registros más bajos de los últimos diez años, mientras la liquidez del productor viene un 10% adelantada respecto a la media histórica gracias a las ventas de trigo, maíz y girasol.',link:'https://bichosdecampo.com/los-productores-argentinos-estan-liquidos-y-no-tienen-apuro-por-vender-soja-a-pesar-de-los-incentivos-presentes-en-el-mercado/'},
  {fecha:'2026-06-30',fuente:'Bichos de Campo',cultivo:'Trigo',titulo:'El USDA recorta la cosecha de trigo de EEUU a niveles mínimos desde 1877 y da un fundamento alcista al mercado',resumen:'El USDA estimó el área total de trigo de EEUU en 2026 en 17,28 millones de hectáreas (-6% interanual), con la superficie de trigo de invierno en 12,75 millones de hectáreas, de las cuales solo se cosecharían 8,58 millones por pérdidas hídricas, la relación siembra/cosecha más baja desde 1877 según la analista Karen Braun. La cosecha de trigo de invierno se proyecta en 28,0 millones de toneladas contra 38,1 Mt del ciclo anterior, lo que impulsó subas en los futuros de trigo y maíz en Chicago y en Rosario (A3 Mercados).',link:'https://bichosdecampo.com/dale-las-gracias-al-usda-por-fin-aparecio-en-ee-uu-un-fundamento-alcista-para-el-trigo/'},
  {fecha:'2026-06-30',fuente:'LA NACION',cultivo:'Soja',titulo:'La cadena de la soja pidió acelerar la baja de las retenciones al cultivo',resumen:'En la apertura del Seminario Acsoja 2026 en la Bolsa de Comercio de Rosario, el presidente de Acsoja, Rodolfo Rossi, calificó a los derechos de exportación como «el principal condicionante» para el desarrollo de la cadena y pidió acelerar el cronograma oficial, que hoy lleva la alícuota del 24% a 23,75% a comienzos de 2027 y a 21% hacia fin de ese año, con bajas de medio punto mensual hasta 15% en 2028. Rossi remarcó que la soja tributa 24% frente al 8,5% del maíz y pidió reducir esa brecha para destrabar inversión y producción.',link:'https://www.lanacion.com.ar/economia/campo/principal-condicionante-la-cadena-de-la-soja-pidio-acelerar-la-baja-de-las-retenciones-al-cultivo-nid30062026/'},
  {fecha:'2026-06-28',fuente:'Bichos de Campo',cultivo:'Trigo / Maíz / Soja',titulo:'La comercialización de cereales supera 4 a 1 a la de soja en lo que va del ciclo 2025/26',resumen:'Al 17 de junio, el volumen de cereales (trigo, maíz, cebada y sorgo) comercializados con precio hecho sumaba 38,5 millones de toneladas frente a apenas 9,57 millones de soja, una relación de 4 a 1 inédita según datos oficiales. En el mercado de futuros A3 el desbalance es menor: el interés abierto de maíz y trigo 2025/26 suma 2,09 millones de toneladas contra 1,42 millones de soja.',link:'https://bichosdecampo.com/el-otro-mundial-en-el-campeonato-agricola-los-cereales-van-goleando-a-la-soja-en-una-proporcion-de-4-a-1/'},
  {fecha:'2026-06-27',fuente:'LA NACION',cultivo:'Trigo / Maíz / Soja',titulo:'La NOAA confirma la instalación oficial de El Niño y prevé 63% de probabilidad de que sea muy fuerte entre noviembre y enero',resumen:'La NOAA declaró que ya se cumplen las condiciones de un evento El Niño en el Pacífico ecuatorial y proyectó un 63% de probabilidad de que se intensifique a categoría «muy fuerte» entre noviembre y enero, lo que lo posicionaría entre los más importantes desde 1950. En la Argentina el impacto fuerte llegaría a partir de la primavera: el NEA empezaría a sentir mayores lluvias desde septiembre, mientras que en Buenos Aires, La Pampa y Córdoba el efecto se notaría recién entre octubre y noviembre, según el meteorólogo Leonardo de Benedictis.',link:'https://www.lanacion.com.ar/economia/campo/la-temperatura-del-oceano-pacifico-ya-alcanzo-un-nivel-compatible-con-el-nino-nid27062026/'},
  {fecha:'2026-06-27',fuente:'LA NACION',cultivo:'Trigo / Maíz / Soja',titulo:'La soja se consolida como reserva de valor mientras se acelera la comercialización de trigo, maíz y cebada',resumen:'Según el informe de compras y ventas de la Secretaría de Agricultura, los productores ya vendieron 19,2 Mt de trigo (exportación y molinería), 27,4 Mt de maíz y 4,5 Mt entre cebada forrajera y cervecera, un total cercano a 52 Mt equivalente a unos US$20.000 millones de divisas. En soja, la industria aceitera acumula compras por 17,4 Mt (7,6 Mt a precio y 9,9 Mt a fijar), mientras los exportadores están cerca de cubrir sus DJVE; al 17 de junio ya se registraron 1,9 Mt de compras de trigo nuevo 2026/27, con el mercado forward en «carry» entre la cosecha vieja y la nueva.',link:'https://www.lanacion.com.ar/economia/campo/agricultura/la-soja-se-consolida-como-reserva-de-valor-y-se-empieza-a-mover-el-trigo-202627-nid27062026/'}
];
/* ═══════════════════════════════════════════════════════════════════════ */

var currentFilter = 'todos';

function setFilter(crop) {
  currentFilter = crop;
  ['todos','trigo','maiz','soja'].forEach(function(c) {
    var el = document.getElementById('chip-' + c);
    if (el) el.classList.toggle('active', c === crop);
  });
  render();
}

function render() {
  var container = document.getElementById('news-container');
  var countEl   = document.getElementById('filter-count');
  var updateEl  = document.getElementById('update-date');
  var cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 7);

  var items = NEWS_DATA.filter(function(n) {
    var d = new Date(n.fecha);
    if (d < cutoff) return false;
    if (currentFilter === 'todos') return true;
    return n.cultivo.toLowerCase().indexOf(currentFilter) >= 0;
  });

  if (countEl) countEl.textContent = items.length + ' nota' + (items.length !== 1 ? 's' : '');
  if (updateEl && NEWS_DATA.length > 0) updateEl.textContent = NEWS_DATA[0].fecha;

  if (items.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🌿</div><p>No hay noticias para el filtro seleccionado.</p></div>';
    return;
  }

  var html = '<div class="news-list">';
  var lastDate = '';

  items.forEach(function(n) {
    var colorClass = n.cultivo.indexOf('/') >= 0 ? 'c-multi'
      : n.cultivo.toLowerCase().indexOf('trigo') >= 0 ? 'c-trigo'
      : (n.cultivo.toLowerCase().indexOf('maíz') >= 0 || n.cultivo.toLowerCase().indexOf('maiz') >= 0) ? 'c-maiz'
      : n.cultivo.toLowerCase().indexOf('soja') >= 0 ? 'c-soja' : '';

    var tagClass = n.cultivo.indexOf('/') >= 0 ? 'tag-multi'
      : n.cultivo.toLowerCase().indexOf('trigo') >= 0 ? 'tag-trigo'
      : (n.cultivo.toLowerCase().indexOf('maíz') >= 0 || n.cultivo.toLowerCase().indexOf('maiz') >= 0) ? 'tag-maiz'
      : n.cultivo.toLowerCase().indexOf('soja') >= 0 ? 'tag-soja' : 'tag-gen';

    var daysAgo = Math.floor((new Date() - new Date(n.fecha)) / 86400000);
    var age = daysAgo === 0 ? 'Hoy' : daysAgo === 1 ? 'Ayer' : 'Hace ' + daysAgo + ' días';
    var isFresh = daysAgo <= 1;

    if (n.fecha !== lastDate) {
      var label = daysAgo === 0 ? 'Hoy' : daysAgo === 1 ? 'Ayer'
        : new Date(n.fecha + 'T00:00:00').toLocaleDateString('es-AR', {weekday:'long', day:'numeric', month:'long'});
      html += '<div class="date-divider">' + label + '</div>';
      lastDate = n.fecha;
    }

    var resumen = n.resumen.length > 220 ? n.resumen.slice(0, 220).replace(/\s\S+$/, '') + '…' : n.resumen;

    html += '<div class="news-card ' + colorClass + '">'
      + '<div class="card-meta">'
      + '<span class="card-fecha">' + n.fecha + '</span>'
      + '<span class="card-fuente">' + n.fuente + '</span>'
      + '<span class="card-cultivo ' + tagClass + '">' + n.cultivo + '</span>'
      + '<span class="age-badge' + (isFresh ? ' fresh' : '') + '">' + age + '</span>'
      + '</div>'
      + '<div class="card-titulo">' + n.titulo + '</div>'
      + '<div class="card-resumen">' + resumen + '</div>'
      + '<div class="card-footer"><a class="btn-ver-nota" href="' + n.link + '" target="_blank" rel="noopener">Ver nota →</a></div>'
      + '</div>';
  });

  html += '</div>';
  container.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', render);

</script>
</body>
</html>
