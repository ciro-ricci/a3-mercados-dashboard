body {

/* ── Header ── */

  flex-wrap: wrap;
  gap: 8px;
}

.header-left .sub { font-size: 0.75rem; opacity: 0.55; margin-top: 3px; }
.header-right { text-align: right; }
.header-right .update-label { font-size: 0.68rem; opacity: 0.45; }
.header-right .update-date  { font-size: 0.8rem; opacity: 0.75; margin-top: 2px; }

/* ── Barra de filtros ── */
.filter-bar {
  background: #16213e;
  padding: 10px 24px;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.filter-chip {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.15);
  background: transparent;
  color: rgba(255,255,255,0.5);
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.filter-chip:hover { color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.35); }
.filter-chip.active               { background: #4ecdc4; color: #1a1a2e; border-color: #4ecdc4; }
.filter-chip.chip-trigo.active    { background: #fcd34d; color: #1a1a2e; border-color: #fcd34d; }
.filter-chip.chip-maiz.active     { background: #86efac; color: #1a1a2e; border-color: #86efac; }
.filter-chip.chip-soja.active     { background: #93c5fd; color: #1a1a2e; border-color: #93c5fd; }
.filter-count { margin-left: auto; font-size: 0.72rem; color: rgba(255,255,255,0.3); }

/* ── Contenido ── */
.content {
  padding: 20px 24px;
  max-width: 780px;
  margin: 0 auto;
}
@media (max-width: 600px) { .content { padding: 14px 12px; } }

/* ── Estado vacío ── */
.empty-state { text-align: center; padding: 60px 20px; color: #aaa; }
.empty-state .icon { font-size: 2.8rem; margin-bottom: 12px; }
.empty-state p { font-size: 0.88rem; }

.news-list { display: flex; flex-direction: column; gap: 14px; }

/* ── Card ── */
.news-card {
  background: white;
  border-radius: 12px;
  padding: 18px 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  display: flex;
  flex-direction: column;
  gap: 10px;
  border-left: 4px solid #e8eaed;
  transition: box-shadow 0.15s, transform 0.1s;
}
.news-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.10); transform: translateY(-1px); }
.news-card.c-trigo { border-left-color: #f59e0b; }
.news-card.c-maiz  { border-left-color: #22c55e; }
.news-card.c-soja  { border-left-color: #3b82f6; }
.news-card.c-multi { border-left-color: #8b5cf6; }

.card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.card-fecha { font-size: 0.72rem; color: #999; white-space: nowrap; }
.card-fuente {
  font-size: 0.72rem; font-weight: 700;
  background: #f0f2f5; color: #444;
  padding: 2px 9px; border-radius: 20px; white-space: nowrap;

.card-cultivo {
  font-size: 0.7rem; font-weight: 700;
  padding: 2px 9px; border-radius: 20px; white-space: nowrap;

.tag-trigo { background: #fef3c7; color: #92400e; }
.tag-maiz  { background: #dcfce7; color: #166534; }
.tag-soja  { background: #dbeafe; color: #1e3a8a; }
.tag-multi { background: #ede9fe; color: #4c1d95; }
.tag-gen   { background: #f3f4f6; color: #6b7280; }

.age-badge.fresh { color: #16a34a; font-weight: 700; }

.card-titulo {
  font-size: 0.92rem;
  font-weight: 700;
  line-height: 1.45;
  color: #1a1a2e;

.card-resumen {
  font-size: 0.82rem;
  color: #4b5563;
  line-height: 1.65;

.btn-ver-nota {

  background: #1a1a2e;
  color: white;

  font-weight: 600;

  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.6px;
}
.date-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #e5e7eb;

/* ═══════════════════════════════════════════════════════════════════════ */

let activeFilter = 'todos';

const FUENTE_EMOJI = {
  'Bichos de Campo': '🐛',
  'Agrositio':       '🌐',
  'BCR':             '📊',
  'BCBA':            '📈',
  'Infocampo':       '📰',
  'Safras & Mercado':'🌎',
  'fyo Mercados':    '💹',
  'Zeni Granos':     '🌾',
  'Granar':          '🏪',
  'AZ-Group':        '📋',
};

function cultivoClass(c) {
  const l = c.toLowerCase();
  const s = /soja/.test(l), m = /ma[íi]z/.test(l), t = /trigo/.test(l);
  if ([s,m,t].filter(Boolean).length > 1) return 'multi';
  if (t) return 'trigo'; if (m) return 'maiz'; if (s) return 'soja';
  return 'gen';
}
function tagClass(cc) {
  return {trigo:'tag-trigo',maiz:'tag-maiz',soja:'tag-soja',multi:'tag-multi',gen:'tag-gen'}[cc]||'tag-gen';
}
function cultivoEmoji(c) {
  const l = c.toLowerCase();
  const parts = [];
  if (/trigo/.test(l)) parts.push('🌾');
  if (/ma[íi]z/.test(l)) parts.push('🌽');
  if (/soja/.test(l)) parts.push('🫘');
  return parts.length ? parts.join('') + ' ' : '';
}
function diasAtras(f) {
  const d = Math.floor((Date.now() - new Date(f)) / 86400000);
  if (d === 0) return '⚡ Hoy';
  if (d === 1) return '✅ Ayer';
  return `🕐 Hace ${d} días`;
}
function isFresh(f) { return (Date.now() - new Date(f)) < 3 * 86400000; }
function formatFecha(s) {
  const [y,m,d] = s.split('-');
  const meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(d)} ${meses[parseInt(m)-1]} ${y}`;
}
function fuente_emoji(nombre) {
  return (FUENTE_EMOJI[nombre] || '📄') + ' ' + nombre;
}

function renderNews() {
  const container = document.getElementById('news-container');
  const cutoff = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);

  const filtered = NEWS_DATA.filter(n => {
    if (new Date(n.fecha) < cutoff) return false;
    if (activeFilter === 'todos') return true;
    return n.cultivo.toLowerCase().includes(activeFilter === 'maiz' ? 'maíz' : activeFilter);
  });

  document.getElementById('filter-count').textContent =
    filtered.length + (filtered.length === 1 ? ' noticia' : ' noticias');

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">🌿</div>
        <p>No hay noticias recientes para el filtro seleccionado.</p>
      </div>`;
    return;
  }

  // Agrupar por fecha para los separadores
  const porFecha = {};
  filtered.forEach(n => {
    if (!porFecha[n.fecha]) porFecha[n.fecha] = [];
    porFecha[n.fecha].push(n);
  });

  const html = Object.keys(porFecha).sort((a,b) => b.localeCompare(a)).map(fecha => {
    const etiqueta = (() => {
      const d = Math.floor((Date.now() - new Date(fecha)) / 86400000);
      if (d === 0) return '⚡ Hoy';
      if (d === 1) return '✅ Ayer';
      return `📅 ${formatFecha(fecha)}`;
    })();

    const cards = porFecha[fecha].map(n => {
      const cc = cultivoClass(n.cultivo);
      return `
      <div class="news-card c-${cc}">
        <div class="card-meta">
          <span class="card-fuente">${fuente_emoji(n.fuente)}</span>
          <span class="card-cultivo ${tagClass(cc)}">${cultivoEmoji(n.cultivo)}${n.cultivo}</span>
          <span class="age-badge ${isFresh(n.fecha)?'fresh':''}">${diasAtras(n.fecha)}</span>
        </div>
        <div class="card-titulo">${n.titulo}</div>
        <div class="card-resumen">${n.resumen}</div>
        <div class="card-footer">
          <a class="btn-ver-nota" href="${n.link}" target="_blank">🔗 Ver nota completa</a>
        </div>
      </div>`;
    }).join('');

    return `<div class="date-divider">${etiqueta}</div>${cards}`;
  }).join('');

  container.innerHTML = `<div class="news-list">${html}</div>`;
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  document.getElementById('chip-' + f).classList.add('active');
  renderNews();
}

function setUpdateDate() {
  if (!NEWS_DATA.length) return;
  const latest = NEWS_DATA.reduce((a,b) => a.fecha > b.fecha ? a : b);
  document.getElementById('update-date').textContent = formatFecha(latest.fecha);
}

setUpdateDate();
renderNews();
</script>
</body>
</html>
