<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A3 Mercados — Noticias</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f0f2f5;
  color: #1a1a2e;
  min-height: 100vh;
}

/* ── Header ── */
.header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  color: white;
  padding: 18px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}
.header-left h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: 0.5px; }
.header-left .sub { font-size: 0.75rem; opacity: 0.55; margin-top: 3px; }
.header-right { text-align: right; }
.header-right .update-label { font-size: 0.68rem; opacity: 0.45; }
.header-right .update-date  { font-size: 0.8rem; opacity: 0.75; margin-top: 2px; }

/* ── Barra de filtros ── */
.filter-bar {
  background: #16213e;
  padding: 10px 24px;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.filter-chip {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.15);
  background: transparent;
  color: rgba(255,255,255,0.5);
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.filter-chip:hover { color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.35); }
.filter-chip.active               { background: #4ecdc4; color: #1a1a2e; border-color: #4ecdc4; }
.filter-chip.chip-trigo.active    { background: #fcd34d; color: #1a1a2e; border-color: #fcd34d; }
.filter-chip.chip-maiz.active     { background: #86efac; color: #1a1a2e; border-color: #86efac; }
.filter-chip.chip-soja.active     { background: #93c5fd; color: #1a1a2e; border-color: #93c5fd; }
.filter-count { margin-left: auto; font-size: 0.72rem; color: rgba(255,255,255,0.3); }

/* ── Contenido ── */
.content {
  padding: 20px 24px;
  max-width: 780px;
  margin: 0 auto;
}
@media (max-width: 600px) { .content { padding: 14px 12px; } }

/* ── Estado vacío ── */
.empty-state { text-align: center; padding: 60px 20px; color: #aaa; }
.empty-state .icon { font-size: 2.8rem; margin-bottom: 12px; }
.empty-state p { font-size: 0.88rem; }

/* ── Lista de noticias (columna única) ── */
.news-list { display: flex; flex-direction: column; gap: 14px; }

/* ── Card ── */
.news-card {
  background: white;
  border-radius: 12px;
  padding: 18px 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  display: flex;
  flex-direction: column;
  gap: 10px;
  border-left: 4px solid #e8eaed;
  transition: box-shadow 0.15s, transform 0.1s;
}
.news-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.10); transform: translateY(-1px); }
.news-card.c-trigo { border-left-color: #f59e0b; }
.news-card.c-maiz  { border-left-color: #22c55e; }
.news-card.c-soja  { border-left-color: #3b82f6; }
.news-card.c-multi { border-left-color: #8b5cf6; }

/* ── Meta de la card ── */
.card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.card-fecha { font-size: 0.72rem; color: #999; white-space: nowrap; }
.card-fuente {
  font-size: 0.72rem; font-weight: 700;
  background: #f0f2f5; color: #444;
  padding: 2px 9px; border-radius: 20px; white-space: nowrap;
}
.card-cultivo {
  font-size: 0.7rem; font-weight: 700;
  padding: 2px 9px; border-radius: 20px; white-space: nowrap;
}
.tag-trigo { background: #fef3c7; color: #92400e; }
.tag-maiz  { background: #dcfce7; color: #166534; }
.tag-soja  { background: #dbeafe; color: #1e3a8a; }
.tag-multi { background: #ede9fe; color: #4c1d95; }
.tag-gen   { background: #f3f4f6; color: #6b7280; }

.age-badge { font-size: 0.68rem; color: #bbb; margin-left: auto; white-space: nowrap; }
.age-badge.fresh { color: #16a34a; font-weight: 700; }

/* ── Cuerpo ── */
.card-titulo {
  font-size: 0.92rem;
  font-weight: 700;
  line-height: 1.45;
  color: #1a1a2e;
}
.card-resumen {
  font-size: 0.82rem;
  color: #4b5563;
  line-height: 1.65;
}

/* ── Footer ── */
.card-footer { padding-top: 2px; }
.btn-ver-nota {
  display: inline-block;
  background: #1a1a2e;
  color: white;
  font-size: 0.78rem;
  font-weight: 600;
  padding: 7px 18px;
  border-radius: 8px;
  text-decoration: none;
  transition: background 0.15s;
  font-family: inherit;
}
.btn-ver-nota:hover { background: #2d3a5e; }

/* ── Separador de fecha ── */
.date-divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 6px 0 2px;
  color: #9ca3af;
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.6px;
}
.date-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #e5e7eb;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>📰 Noticias del campo</h1>
    <div class="sub">🌾 Trigo · 🌽 Maíz · 🫘 Soja — últimos 7 días</div>
  </div>
  <div class="header-right">
    <div class="update-label">🔄 Última actualización</div>
    <div class="update-date" id="update-date">—</div>
  </div>
</div>

<div class="filter-bar">
  <button class="filter-chip active"     onclick="setFilter('todos')" id="chip-todos">🌿 Todos</button>
  <button class="filter-chip chip-trigo" onclick="setFilter('trigo')" id="chip-trigo">🌾 Trigo</button>
  <button class="filter-chip chip-maiz"  onclick="setFilter('maiz')"  id="chip-maiz">🌽 Maíz</button>
  <button class="filter-chip chip-soja"  onclick="setFilter('soja')"  id="chip-soja">🫘 Soja</button>
  <span class="filter-count" id="filter-count"></span>
</div>

<div class="content">
  <div id="news-container"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════
   NEWS_DATA — Claude actualiza este bloque cada vez que corre el scraping.
   Las noticias con más de 7 días son eliminadas automáticamente del array.
   Última actualización: 2026-07-14
   ═══════════════════════════════════════════════════════════════════════ */
const NEWS_DATA = [
  {fecha:'2026-07-13',fuente:'Bichos de Campo',cultivo:'Maíz',titulo:'Nuevo récord: exportadores argentinos anotaron embarques de maíz por 2,39 millones de toneladas en una sola jornada',resumen:'AGD, ADM, la Asociación de Cooperativas Argentinas (ACA), Bunge, Cargill, COFCO y LDC registraron en un solo día Declaraciones Juradas de Ventas Externas (DJVE) de maíz por 2,39 millones de toneladas con embarque previsto entre julio y septiembre, superando el hito de 1,83 millones de toneladas anotado a comienzos de mes. Con esta anotación, el programa de embarques de julio ya suma 2,82 millones de toneladas y el de agosto 3,93 millones, consolidando al maíz como el principal protagonista de la campaña gruesa 2025/26 en el ranking de despachos programados.',link:'https://bichosdecampo.com/zarpado-exportadores-argentinos-registraron-en-un-solo-dia-embarques-de-maiz-por-239-millones-de-toneladas/'},
  {fecha:'2026-07-13',fuente:'Bichos de Campo',cultivo:'Maíz',titulo:'La exportación sigue pagando "premios" por el maíz argentino, sin los cuales los precios locales serían mucho más bajos',resumen:'Con un FOB de referencia de 206 US$/t y una alícuota de exportación del 8,5%, el FAS teórico del maíz ronda los 175 US$/t, muy por debajo de lo que efectivamente convalida la demanda, que sigue pagando premios significativos para asegurarse originación. La razón: con Brasil todavía retraído del mercado y los embarques ucranianos comprometidos por la escalada del conflicto con Rusia, Argentina se transformó prácticamente en el único origen abierto y sin riesgo logístico para abastecer al mundo hasta que ingrese el grueso de la cosecha tardía (safrinha) brasileña.',link:'https://bichosdecampo.com/la-exportacion-sigue-pagando-premios-por-el-maiz-sin-los-cuales-los-precios-serian-horribles/'},
  {fecha:'2026-07-13',fuente:'Infobae',cultivo:'Soja',titulo:'El nuevo cierre del estrecho de Ormuz y la ola de calor en EEUU impulsaron el precio de la soja',resumen:'La escalada del conflicto en Medio Oriente, con un nuevo cierre del estrecho de Ormuz, reinstaló una prima de riesgo geopolítico en los mercados internacionales de commodities. En Chicago, el aceite de soja se acercó a los 1.600 US$/t, una suba de más del 5% en la semana, contagiando al precio del poroto en un contexto en el que los pronósticos anticipan una ola de calor sobre las zonas sojeras clave de Estados Unidos justo en la etapa crítica de definición de rendimiento.',link:'https://www.infobae.com/economia/2026/07/13/el-conflicto-y-el-clima-le-sientan-bien-el-nuevo-cierre-del-estrecho-de-ormuz-y-la-ola-de-calor-en-eeuu-impulsaron-el-precio-de-la-soja/'},
  {fecha:'2026-07-13',fuente:'Todoagro',cultivo:'Trigo',titulo:'El trigo alcanzó su valor más alto desde mayo tras la suspensión rusa de la navegación comercial en el canal Don-Azov',resumen:'Rusia suspendió la navegación comercial en el canal Don-Azov luego de ataques con drones ucranianos contra buques graneleros en la zona, lo que reavivó los temores sobre la capacidad exportadora de la región del Mar Negro y llevó al trigo a tocar su cotización más alta desde mayo. El mercado ya venía atento a esta ruta desde que la consultora rusa SovEcon había advertido semanas atrás sobre el riesgo de bloqueo del estrecho de Kerch y el propio canal del Don, con hasta 20 millones de toneladas de trigo potencialmente afectadas.',link:'https://www.todoagro.com.ar/la-soja-y-el-maiz-suben-impulsados-por-el-clima-y-el-usda-mientras-el-trigo-alcanza-su-valor-mas-alto-desde-mayo/'},
  {fecha:'2026-07-10',fuente:'Infocampo',cultivo:'Trigo / Maíz / Soja',titulo:'Panorama agrícola: terminó la soja, el maíz sufre daños por chicharrita en el norte y el trigo sigue recuperando área',resumen:'La Bolsa de Cereales de Buenos Aires dio por finalizada la cosecha de soja 2025/26 con 50,1 Mt (-0,4% interanual pero +19% vs. el promedio de 5 años) y rinde de 31,3 qq/ha, con máximos de hasta 55 qq/ha en la zona núcleo y récords en NOA y Norte de La Pampa-Oeste de Buenos Aires, mientras el sudeste bonaerense quedó por debajo de la media histórica. El maíz avanza al 56% con rinde de 81 qq/ha y daños por chicharrita en Chaco y Santiago del Estero que dejan rindes de 15 a 20 qq/ha en lotes tempranos, aunque la BCR mantiene su proyección nacional en 68 Mt sobre 10,2 millones de hectáreas sembradas (de las que 1,3 millones no entrarían al circuito comercial); en Chaco y Santiago del Estero, técnicos ya evalúan reducir drásticamente la superficie de maíz temprano en la próxima siembra, en algunos casos migrando hacia sorgo, para evitar los «puentes verdes» que favorecen a la chicharrita. Materiales de maíz que hasta ahora habían mostrado tolerancia a Dalbulus maidis no resistieron esta campaña y fueron quebrados por Spiroplasma, una de las principales enfermedades transmitidas por el insecto vector. El trigo recuperó unas 130.000 hectáreas en La Pampa y Buenos Aires por la baja del precio de la urea a 550 US$/t desde los 1.000 US$/t de mayo, y la BCR ahora proyecta 6,95 millones de hectáreas sembradas, apenas 3% por debajo del récord del año pasado.',link:'https://www.infocampo.com.ar/panorama-agricola-termino-la-soja-el-maiz-volvio-a-sufrir-danos-por-chicharrita-y-el-trigo-sigue-repuntando/'},
  {fecha:'2026-07-10',fuente:'Bichos de Campo',cultivo:'Trigo / Maíz',titulo:'El USDA recorta los stocks de maíz y trigo en su informe de julio mientras crece el riesgo de bloqueo del estrecho de Kerch',resumen:'El WASDE de julio redujo los stocks finales 2025/26 de maíz de EEUU en 125 millones de bushels, a 2.020 millones, y los de 2026/27 en 170 millones, a 1.790 millones (80 millones por debajo de lo esperado), con el uso forrajero subiendo 150 millones de bushels y el de etanol cayendo 25 millones; a la vez bajó los stocks globales de maíz 2026/27 en 6 Mt, a 275,3 Mt, y recortó la producción de la UE en 3,7 Mt, a 57,5 Mt, mientras elevó las importaciones europeas en 3 Mt, a 22,5 Mt. En trigo, la producción de EEUU se ubicó en 1.536 millones de bushels, la más baja desde 1970, con la producción de invierno en 990 millones (471 de HRW y 287 de SRW) y los stocks globales 2026/27 cayendo a 273 Mt; el USDA además elevó en 1 Mt las importaciones chinas de trigo para 2025/26 y 2026/27, a 113 y 115 Mt, y sigue proyectando de manera tentativa una cosecha de trigo australiana de 28 Mt para la nueva campaña, muy por encima del pronóstico oficial de 26,7 Mt en el mejor de los escenarios, con un panorama climático de restricciones hídricas por delante. La consultora rusa SovEcon advirtió que Rusia podría cerrar el estrecho de Kerch y el canal del Don tras un ataque ucraniano con drones, lo que dejaría bloqueados hasta 20 Mt de trigo justo cuando el USDA proyecta exportaciones rusas de 47,5 Mt para 2026/27.',link:'https://bichosdecampo.com/cereales-bajo-fuego-una-avalancha-de-factores-alcistas-disparan-los-precios-del-trigo-y-el-maiz/'},
  {fecha:'2026-07-10',fuente:'Bichos de Campo',cultivo:'Trigo / Maíz',titulo:'Cada vez es mayor la evidencia de que Francia se encamina hacia un desastre productivo en maíz y trigo',resumen:'Francia, principal productor de maíz y trigo de la UE, redujo la calificación de su maíz en «bueno a excelente» al 47%, once puntos menos que la semana anterior, por una ola de calor extremo. La cosecha de trigo blando de invierno ya alcanza el 59% del área versus 26% hace una semana y un promedio de 16% en los últimos cinco años, reflejo de los bajos rindes obtenidos, lo que impulsó subas intradiarias espectaculares en los futuros de Euronext. La consultora Coceral recortó su proyección de maíz de la UE-27 y Reino Unido a 52,7 Mt (vs. 57,2 Mt en junio), con Francia en apenas 9,4 Mt, la cifra más baja en dos décadas, y bajó la de trigo blando a 140,8 Mt (vs. 143,7 Mt); el USDA proyecta que la UE debería exportar 31 Mt de trigo en 2025/26 sobre un total mundial de 211,9 Mt.',link:'https://bichosdecampo.com/cada-vez-es-mayor-la-evidencia-de-que-francia-se-encamina-hacia-un-desastre-productivo-en-maiz-y-trigo/'},
  {fecha:'2026-07-10',fuente:'ADM Investor Services',cultivo:'Soja',titulo:'El USDA elevó la producción de soja de EEUU pero mantuvo firmes los stocks finales 2026/27',resumen:'El WASDE de julio ubicó la producción de soja de EEUU en 4.475 millones de bushels, 15 millones por encima de lo esperado, con un rinde de tendencia récord de 53 bushels por acre. Los stocks finales 2025/26 se recortaron en 10 millones de bushels, a 330 millones, por mayores exportaciones, mientras los de 2026/27 quedaron sin cambios en 310 millones (20 millones por debajo de lo esperado) y la demanda de la nueva campaña subió 30 millones de bushels por mayores exportaciones. A nivel global, los stocks 2026/27 se ubicaron en 124,2 Mt, 1 Mt por debajo de lo esperado, y el USDA elevó en 1 Mt las importaciones de China tanto para 2025/26 como para 2026/27, a 113 y 115 Mt respectivamente.',link:'https://www.admis.com/usda-july-10-wasde-supportive-corn-beans-neutral-wheat/'},
  {fecha:'2026-07-08',fuente:'El Litoral',cultivo:'Trigo / Maíz',titulo:'Con el regreso del tiempo estable, la siembra de trigo alcanzó el 95% en el centro-norte santafesino',resumen:'El informe semanal del Sistema de Estimaciones Agrícolas (SEA) de la Bolsa de Comercio de Santa Fe, correspondiente al 1-7 de julio, indicó que la siembra de trigo llegó a 427.500 hectáreas, el 95% de las 450.000 previstas para la campaña 2026, con el mayor dinamismo en los departamentos del norte provincial, tras jornadas soleadas con heladas y menor humedad ambiente que redujeron los anegamientos, aunque persisten suelos saturados en sectores bajos. La mejora de piso también reactivó la cosecha de maíz tardío, que cubre 89.000 hectáreas: 95% en condición buena a muy buena (con numerosos lotes excelentes), 4% de buena a regular y apenas 1% malo, con rindes de 80-120 qq/ha en el sur del área relevada, 70-100 qq/ha en el centro y 60-75 qq/ha en el norte. El sorgo granífero finalizó su cosecha con 120.000 hectáreas implantadas (-10% interanual), mientras el algodón, con 106.100 hectáreas (-22/24% interanual) y rindes de 1.000-2.000 kg/ha, sigue demorado por exceso de humedad, lo que empieza a afectar la calidad de fibra, uno de los factores clave del resultado económico de la campaña.',link:'https://www.ellitoral.com/campolitoral/siembra-trigo-centro-norte-santafesino-maiz-tardio-bolsa-comercio-santa-fe-sistema-estimaciones-agricolas_0_CiE1ubn1Cw.html'},
  {fecha:'2026-07-08',fuente:'Safras & Mercado',cultivo:'Soja',titulo:'USDA debería elevar las estimaciones para la producción de soja 2025/26 en Argentina en 50,1 millones de toneladas',resumen:'Analistas consultados por agencias internacionales antes del WASDE de julio proyectaban que el USDA elevaría la producción argentina de soja 2025/26 de 50 a 50,1 millones de toneladas, la de EEUU 2026/27 a 4.457 millones de bushels (desde 4.435 millones en junio) y la de Brasil 2025/26 de 180 a 180,3 millones de toneladas. Para los stocks finales de EEUU, el mercado esperaba 324 millones de bushels en 2026/27 (vs. 310 millones previos) y una baja a 337 millones en 2025/26 (desde 340 millones), mientras a nivel global se anticipaban stocks de 125,2 Mt para 2026/27 y una suba a 125,7 Mt para 2025/26, en el marco de la evaluación de mercado previa a la publicación oficial del reporte.',link:'https://safras.com.br/es/usda-deberia-elevar-las-estimaciones-para-la-produccion-de-soja-2025-26-en-argentina-en-501-millones-de-toneladas/'},
  {fecha:'2026-07-08',fuente:'Bank Magazine',cultivo:'Trigo / Maíz / Soja',titulo:'Aumento de temperaturas, lluvias limitadas y nuevas heladas marcan el escenario agroclimático de julio',resumen:'El informe semanal de perspectivas agroclimáticas de la Bolsa de Cereales de Buenos Aires, correspondiente al período del 9 al 15 de julio, anticipó una pausa transitoria del frío por vientos del trópico, con máximas superiores a 25°C en el este del NOA y el centro de la Mesopotamia y valores de 20-25°C en el centro del NOA, este de Cuyo y norte pampeano, mientras un frente de tormenta dejará lluvias moderadas a abundantes solo en el extremo nordeste (10-25 mm) y escasas o nulas en el resto del país, con tormentas de lluvia y nieve en la Cordillera Sur y Central. Detrás del frente ingresará una masa de aire polar que provocará heladas generalizadas en gran parte de la región pampeana, con mínimas de 0°C a 5°C y sectores del centro del país por debajo de 0°C, además de heladas de mayor intensidad en zonas cordilleranas del NOA y Cuyo. Para la semana del 16 al 22 de julio el frío y seco persistirá al inicio con heladas concentradas en el oeste del área agrícola, con retorno posterior de vientos cálidos que podrían llevar las máximas por encima de 30-35°C en el NOA y la Mesopotamia, aunque las lluvias seguirán siendo escasas en la mayor parte del área agrícola salvo en el extremo norte de la Mesopotamia.',link:'https://bankmagazine.com.ar/aumento-de-temperaturas/'},
  {fecha:'2026-07-08',fuente:'Bank Magazine',cultivo:'Soja',titulo:'El rechazo del Parlamento Europeo a considerar la soja de alto riesgo se celebró en el agro argentino',resumen:'El Parlamento Europeo votó en contra de los cambios propuestos por la Comisión Europea al Reglamento Delegado UE 2019/807, que incorporaba a la soja entre las materias primas de alto riesgo por cambio indirecto del uso del suelo; la Comisión ahora deberá reescribir la propuesta siguiendo los lineamientos del Parlamento, en línea con la posición de la Cancillería y el sector agroindustrial argentino. La Bolsa de Comercio de Rosario celebró la decisión al evitar que se aplicaran criterios que podían restringir el acceso de derivados de soja, en particular biodiésel, al mercado europeo. Gustavo Idigoras, presidente de Ciara-CEC, adelantó que el 16 de julio una delegación argentina estará en Bruselas para discutir la nueva redacción del reglamento, mientras el canciller Pablo Quirno destacó el trabajo conjunto entre Cancillería, gobiernos provinciales -como Santa Fe- y el sector privado para sostener el acceso de la soja argentina a la UE.',link:'https://bankmagazine.com.ar/el-rechazo-del-parlamento-europeo/'},
  {fecha:'2026-07-08',fuente:'deCampoNoticias',cultivo:'Maíz',titulo:'La chicharrita del maíz retrocedió en gran parte del país, pero el norte mantiene una alta presión',resumen:'El último relevamiento de la Red Nacional de Monitoreo de Dalbulus maidis mostró un retroceso de las capturas en el centro y sur del país, mientras el NOA y el NEA mantienen niveles elevados: en el NOA, el 98% de 51 localidades registró presencia del insecto (83% en la categoría de mayor abundancia), con un promedio que bajó de 998,88 a 807,57 adultos por trampa pero picos de 4.500 en El Bordo (Salta) y 3.771 en Viñalito (Jujuy); en el NEA el 95% de 63 localidades detectó el vector, con un promedio prácticamente sin cambios (781,30 a 759,3 adultos por trampa). En el Litoral el promedio cayó de 132,20 a 88,75 adultos por trampa, en Centro Norte bajó a la mitad (de 753,53 a 363,73) y en Centro Sur el 54% de 97 localidades no registró capturas. Los especialistas remarcaron que el monitoreo debe continuar durante el otoño y el invierno, que las heladas serán determinantes para la supervivencia del insecto, y que la eliminación de maíces voluntarios («puente verde») junto con el Manejo Integrado de Plagas serán claves para contener la plaga de cara a la campaña 2026/27.',link:'https://www.decamponoticias.com/chicharrita-del-maiz-retroceso/'},
  {fecha:'2026-07-08',fuente:'Ruralnet',cultivo:'Soja',titulo:'COFCO confirmó la primera compra concreta de soja estadounidense por parte de China en la campaña',resumen:'La empresa estatal china COFCO adquirió al menos 300.000 toneladas de soja de origen estadounidense, la primera confirmación concreta de demanda china que el mercado esperaba desde hacía semanas, en un contexto de cambio de estrategia de los fondos especulativos y de señales de demanda débil que venían presionando al complejo granario. En Argentina, mientras tanto, la comercialización de la cosecha de soja avanza a un ritmo inusualmente lento, aunque se esperaría mayor actividad de venta durante la segunda mitad del año. El repliegue previo de los fondos especulativos, sumado a un dólar más fuerte, había mantenido a los granos bajo presión en las semanas anteriores, por lo que la confirmación de compras chinas devolvió parte del respaldo a los precios de referencia en Chicago.',link:'https://ruralnet.com.ar/mercado-granos-martes-8-julio-2026-china-cofco-soja-chicago/'},
  {fecha:'2026-07-07',fuente:'Ruralnet',cultivo:'Trigo / Maíz / Soja',titulo:'El clima vuelve a dominar el mercado de granos: el maíz recibe señales alcistas y la soja sigue esperando a China',resumen:'Un informe trimestral de stocks del USDA ubicó las existencias de maíz en EEUU 2,9 millones de toneladas por debajo de lo esperado, mientras Francia atraviesa la peor ola de calor para el cultivo en 26 años (producción estimada en 9,5 Mt) y Ucrania sufre estrés térmico en la floración, según el analista Dante Romano (Universidad Austral). En trigo la oferta mundial sigue abundante, con Rusia elevando su estimación a 91,2 Mt, mientras en Argentina la comercialización de soja sigue rezagada: solo 25% de la producción vendida contra un promedio histórico de 29%.',link:'https://ruralnet.com.ar/mercado-granos-prima-climatica-maiz-alcista-julio-2026/'},
  {fecha:'2026-07-06',fuente:'Bichos de Campo',cultivo:'Maíz',titulo:'Locura en el mercado argentino de maíz: se registraron embarques por 1,83 millones de toneladas en una sola jornada',resumen:'Se anotaron 1,83 Mt de Declaraciones Juradas de Ventas Externas (DJVE) de maíz 2025/26 para embarcar entre julio y octubre próximos, una cifra inédita, mientras ese mismo día también se registraron 600.457 toneladas de harina de soja, 207.000 de poroto y 112.212 de aceite de soja. El programa de embarques de maíz ya suma 2.729.023 toneladas para julio y 1.501.317 para agosto, por delante de la harina de soja con 1.448.950 y 1.025.000 toneladas respectivamente. Con un FOB oficial de 207 US$/t, el FAS teórico ronda los 177 US$/t, muy por debajo de lo que convalida la demanda exportadora, explicada por la incertidumbre en la región del Mar Negro, donde el USDA proyecta una oferta exportable de 27 Mt (23 Mt de Ucrania y 4 Mt de Rusia) ante el recrudecimiento del conflicto bélico entre Rusia y Ucrania, con ataques de drones y misiles que se intensificaron en las últimas semanas y que podrían comprometer la capacidad exportadora de productos agroindustriales de la región del Mar Negro.',link:'https://bichosdecampo.com/locura-en-el-mercado-argentino-de-maiz-se-registraron-en-una-sola-jornada-embarques-por-183-millones-de-toneladas/'},
  {fecha:'2026-07-06',fuente:'Bichos de Campo',cultivo:'Maíz / Soja / Trigo',titulo:'Llegó el mercado climático en EEUU y los precios del maíz y la soja suben por el pronóstico de lluvias escasas',resumen:'La NOAA no prevé lluvias importantes para la próxima semana en la mayor parte del Medio Oeste estadounidense, y el pronóstico extendido a dos semanas anticipa precipitaciones por debajo de lo normal en el oeste y centro de la región, lo que impulsó a fondos agrícolas del CME Group a tomar posiciones compradas en maíz y soja tras una fase bajista. La mayoría de las zonas productoras de EEUU mantiene buena condición hídrica, salvo sectores en los márgenes norte y sur del Medio Oeste, mientras el trigo de invierno sigue condicionado por el recorte de cosecha del USDA a 8,58 millones de hectáreas por sequía.',link:'https://bichosdecampo.com/llego-el-mercado-climatico-en-ee-uu-y-los-precios-del-maiz-y-la-soja-suben-fuerte-ante-el-pronostico-de-lluvias-escasas-a-nulas/'},
  {fecha:'2026-07-06',fuente:'LA NACION',cultivo:'Maíz / Soja',titulo:'Pronóstico de una ola de calor en el Medio Oeste de EEUU pone en alerta al mercado en la etapa crítica de maíz y soja',resumen:'Modelos climáticos como los de la NOAA anticipan un marcado ascenso de las temperaturas entre el sábado 11 y el miércoles 15 de julio en las planicies y el oeste del cinturón agrícola estadounidense, con probabilidades de precipitaciones inferiores a las habituales en el norte de Kansas y gran parte de Nebraska, justo al inicio de la etapa crítica de definición de rendimiento de maíz y soja, según el analista Eugenio Irazuegui (Zeni). El último informe del USDA ya había registrado una baja en la condición buena a excelente de la soja estadounidense, que rondaba los 65 puntos porcentuales, el percentil más alto de los últimos años y muy por encima del promedio histórico de 61 puntos. Jeremías Battistoni, analista de AZ-Group, describió un «cóctel de factores alcistas que tiene mucho que ver con el mercado climático americano que ingresa en el período de máxima volatilidad estacional», coincidiendo con rumores de un posible acuerdo comercial entre Estados Unidos y China que podría derivar en compras de soja de la nueva campaña por parte del gigante asiático.',link:'https://www.lanacion.com.ar/economia/campo/volo-la-soja-el-precio-internacional-subio-us1755-en-medio-de-un-coctel-de-importantes-factores-nid06072026/'},
  {fecha:'2026-07-04',fuente:'El Litoral',cultivo:'Trigo / Maíz / Soja',titulo:'El agro argentino alcanzó un récord histórico de exportaciones en el primer semestre de 2026',resumen:'Según un informe de la Bolsa de Comercio de Rosario, Argentina exportó 60,7 millones de toneladas de granos y subproductos entre enero y junio, el mayor volumen para ese período, con maíz en 21 Mt (+23% vs. promedio histórico) y trigo en 11,1 Mt (+63%). La soja, en cambio, cayó 3% interanual a 20,1 Mt equivalentes y tuvo su menor participación relativa (33%) en 26 años, mientras la cosecha de maíz alcanzaba apenas el 65% del área al 2 de julio, la más lenta en cinco campañas.',link:'https://www.ellitoral.com/campolitoral/agroindustria-argentina-exportaciones-record-maiz-trigo-soja-oleaginosas-cereales-bolsa-comercio-rosario-precios-internacionales-mercado-internacional-gea-bcr_0_9i2RcebMeZ.html'},
  {fecha:'2026-07-04',fuente:'Bolsa de Cereales de Buenos Aires',cultivo:'Trigo / Maíz / Soja',titulo:'El trigo recupera ritmo de siembra y se mantienen las proyecciones para soja y maíz',resumen:'El PAS de la BCBA ubicó la siembra de trigo en 80,9% de las 6,5 millones de hectáreas previstas, tras un avance semanal de 15,1 puntos porcentuales. La cosecha de soja llegó a 99,1% con rinde de 31,4 qq/ha y producción proyectada en 50,1 Mt, mientras el maíz avanzó a 52,9% con rinde de 81,5 qq/ha y una proyección de 64 Mt (+30,6% interanual); el sorgo cubre 69% con rinde de 42,7 qq/ha y 2,9 Mt esperadas, destacándose el centro-norte de Córdoba con 56,5 qq/ha. En trigo, solo un 30% del área transita desde expansión foliar en adelante, con un adelanto de 14,6 puntos porcentuales respecto al promedio histórico.',link:'https://www.ellitoral.com/campolitoral/trigo-soja-maiz-sorgo-bolsa-cereales-buenos-aires-condiciones-climaticas-exceso-humedad-campana-agricola-202627_0_zuDYLuEqIo.html'}
];
/* ═══════════════════════════════════════════════════════════════════════ */

var currentFilter = 'todos';

function setFilter(crop) {
  currentFilter = crop;
  ['todos','trigo','maiz','soja'].forEach(function(c) {
    var el = document.getElementById('chip-' + c);
    if (el) el.classList.toggle('active', c === crop);
  });
  render();
}

function render() {
  var container = document.getElementById('news-container');
  var countEl   = document.getElementById('filter-count');
  var updateEl  = document.getElementById('update-date');
  var cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 7);

  var items = NEWS_DATA.filter(function(n) {
    var d = new Date(n.fecha);
    if (d < cutoff) return false;
    if (currentFilter === 'todos') return true;
    return n.cultivo.toLowerCase().indexOf(currentFilter) >= 0;
  });

  if (countEl) countEl.textContent = items.length + ' nota' + (items.length !== 1 ? 's' : '');
  if (updateEl && NEWS_DATA.length > 0) updateEl.textContent = NEWS_DATA[0].fecha;

  if (items.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🌿</div><p>No hay noticias para el filtro seleccionado.</p></div>';
    return;
  }

  var html = '<div class="news-list">';
  var lastDate = '';

  items.forEach(function(n) {
    var colorClass = n.cultivo.indexOf('/') >= 0 ? 'c-multi'
      : n.cultivo.toLowerCase().indexOf('trigo') >= 0 ? 'c-trigo'
      : (n.cultivo.toLowerCase().indexOf('maíz') >= 0 || n.cultivo.toLowerCase().indexOf('maiz') >= 0) ? 'c-maiz'
      : n.cultivo.toLowerCase().indexOf('soja') >= 0 ? 'c-soja' : '';

    var tagClass = n.cultivo.indexOf('/') >= 0 ? 'tag-multi'
      : n.cultivo.toLowerCase().indexOf('trigo') >= 0 ? 'tag-trigo'
      : (n.cultivo.toLowerCase().indexOf('maíz') >= 0 || n.cultivo.toLowerCase().indexOf('maiz') >= 0) ? 'tag-maiz'
      : n.cultivo.toLowerCase().indexOf('soja') >= 0 ? 'tag-soja' : 'tag-gen';

    var daysAgo = Math.floor((new Date() - new Date(n.fecha)) / 86400000);
    var age = daysAgo === 0 ? 'Hoy' : daysAgo === 1 ? 'Ayer' : 'Hace ' + daysAgo + ' días';
    var isFresh = daysAgo <= 1;

    if (n.fecha !== lastDate) {
      var label = daysAgo === 0 ? 'Hoy' : daysAgo === 1 ? 'Ayer'
        : new Date(n.fecha + 'T00:00:00').toLocaleDateString('es-AR', {weekday:'long', day:'numeric', month:'long'});
      html += '<div class="date-divider">' + label + '</div>';
      lastDate = n.fecha;
    }

    var resumen = n.resumen.length > 220 ? n.resumen.slice(0, 220).replace(/\s\S+$/, '') + '…' : n.resumen;

    html += '<div class="news-card ' + colorClass + '">'
      + '<div class="card-meta">'
      + '<span class="card-fecha">' + n.fecha + '</span>'
      + '<span class="card-fuente">' + n.fuente + '</span>'
      + '<span class="card-cultivo ' + tagClass + '">' + n.cultivo + '</span>'
      + '<span class="age-badge' + (isFresh ? ' fresh' : '') + '">' + age + '</span>'
      + '</div>'
      + '<div class="card-titulo">' + n.titulo + '</div>'
      + '<div class="card-resumen">' + resumen + '</div>'
      + '<div class="card-footer"><a class="btn-ver-nota" href="' + n.link + '" target="_blank" rel="noopener">Ver nota →</a></div>'
      + '</div>';
  });

  html += '</div>';
  container.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', render);

</script>
</body>
</html>
