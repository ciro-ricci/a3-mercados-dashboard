<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A3 Mercados — Noticias</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f0f2f5;
  color: #1a1a2e;
  min-height: 100vh;
}

/* ── Header ── */
.header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  color: white;
  padding: 18px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}
.header-left h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: 0.5px; }
.header-left .sub { font-size: 0.75rem; opacity: 0.55; margin-top: 3px; }
.header-right { text-align: right; }
.header-right .update-label { font-size: 0.68rem; opacity: 0.45; }
.header-right .update-date  { font-size: 0.8rem; opacity: 0.75; margin-top: 2px; }

/* ── Barra de filtros ── */
.filter-bar {
  background: #16213e;
  padding: 10px 24px;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.filter-chip {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.15);
  background: transparent;
  color: rgba(255,255,255,0.5);
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.filter-chip:hover { color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.35); }
.filter-chip.active               { background: #4ecdc4; color: #1a1a2e; border-color: #4ecdc4; }
.filter-chip.chip-trigo.active    { background: #fcd34d; color: #1a1a2e; border-color: #fcd34d; }
.filter-chip.chip-maiz.active     { background: #86efac; color: #1a1a2e; border-color: #86efac; }
.filter-chip.chip-soja.active     { background: #93c5fd; color: #1a1a2e; border-color: #93c5fd; }
.filter-count { margin-left: auto; font-size: 0.72rem; color: rgba(255,255,255,0.3); }

/* ── Contenido ── */
.content {
  padding: 20px 24px;
  max-width: 780px;
  margin: 0 auto;
}
@media (max-width: 600px) { .content { padding: 14px 12px; } }

/* ── Estado vacío ── */
.empty-state { text-align: center; padding: 60px 20px; color: #aaa; }
.empty-state .icon { font-size: 2.8rem; margin-bottom: 12px; }
.empty-state p { font-size: 0.88rem; }

/* ── Lista de noticias (columna única) ── */
.news-list { display: flex; flex-direction: column; gap: 14px; }

/* ── Card ── */
.news-card {
  background: white;
  border-radius: 12px;
  padding: 18px 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  display: flex;
  flex-direction: column;
  gap: 10px;
  border-left: 4px solid #e8eaed;
  transition: box-shadow 0.15s, transform 0.1s;
}
.news-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.10); transform: translateY(-1px); }
.news-card.c-trigo { border-left-color: #f59e0b; }
.news-card.c-maiz  { border-left-color: #22c55e; }
.news-card.c-soja  { border-left-color: #3b82f6; }
.news-card.c-multi { border-left-color: #8b5cf6; }

/* ── Meta de la card ── */
.card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.card-fecha { font-size: 0.72rem; color: #999; white-space: nowrap; }
.card-fuente {
  font-size: 0.72rem; font-weight: 700;
  background: #f0f2f5; color: #444;
  padding: 2px 9px; border-radius: 20px; white-space: nowrap;
}
.card-cultivo {
  font-size: 0.7rem; font-weight: 700;
  padding: 2px 9px; border-radius: 20px; white-space: nowrap;
}
.tag-trigo { background: #fef3c7; color: #92400e; }
.tag-maiz  { background: #dcfce7; color: #166534; }
.tag-soja  { background: #dbeafe; color: #1e3a8a; }
.tag-multi { background: #ede9fe; color: #4c1d95; }
.tag-gen   { background: #f3f4f6; color: #6b7280; }

.age-badge { font-size: 0.68rem; color: #bbb; margin-left: auto; white-space: nowrap; }
.age-badge.fresh { color: #16a34a; font-weight: 700; }

/* ── Cuerpo ── */
.card-titulo {
  font-size: 0.92rem;
  font-weight: 700;
  line-height: 1.45;
  color: #1a1a2e;
}
.card-resumen {
  font-size: 0.82rem;
  color: #4b5563;
  line-height: 1.65;
}

/* ── Footer ── */
.card-footer { padding-top: 2px; }
.btn-ver-nota {
  display: inline-block;
  background: #1a1a2e;
  color: white;
  font-size: 0.78rem;
  font-weight: 600;
  padding: 7px 18px;
  border-radius: 8px;
  text-decoration: none;
  transition: background 0.15s;
  font-family: inherit;
}
.btn-ver-nota:hover { background: #2d3a5e; }

/* ── Separador de fecha ── */
.date-divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 6px 0 2px;
  color: #9ca3af;
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.6px;
}
.date-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #e5e7eb;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>📰 Noticias del campo</h1>
    <div class="sub">🌾 Trigo · 🌽 Maíz · 🫘 Soja — últimos 7 días</div>
  </div>
  <div class="header-right">
    <div class="update-label">🔄 Última actualización</div>
    <div class="update-date" id="update-date">—</div>
  </div>
</div>

<div class="filter-bar">
  <button class="filter-chip active"     onclick="setFilter('todos')" id="chip-todos">🌿 Todos</button>
  <button class="filter-chip chip-trigo" onclick="setFilter('trigo')" id="chip-trigo">🌾 Trigo</button>
  <button class="filter-chip chip-maiz"  onclick="setFilter('maiz')"  id="chip-maiz">🌽 Maíz</button>
  <button class="filter-chip chip-soja"  onclick="setFilter('soja')"  id="chip-soja">🫘 Soja</button>
  <span class="filter-count" id="filter-count"></span>
</div>

<div class="content">
  <div id="news-container"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════
   NEWS_DATA — Claude actualiza este bloque cada vez que corre el scraping.
   Las noticias con más de 7 días son eliminadas automáticamente del array.
   Última actualización: 2026-06-15
   ═══════════════════════════════════════════════════════════════════════ */
const NEWS_DATA = [
  {"fecha":"2026-06-13","fuente":"Bichos de Campo","cultivo":"Soja","titulo":"El balance regional de la soja en 2025/26 consolida el rol crucial de la zona central","resumen":"La BCR estima la producción de soja 2025/26 en 51,5 Mt: la región Centro aportaría el 75% (≈38,6 Mt), la Sur 6,4 Mt y la Norte 6,3 Mt. Se procesarían 43,6 Mt en el complejo oleaginoso, con exportaciones de poroto proyectadas en al menos 6,0 Mt. Los stocks finales nacionales subirán de 3,4 a 6,3 Mt gracias a la cosecha récord, con el Gran Rosario concentrando 37,5 Mt de molienda.","link":"https://bichosdecampo.com/el-balance-regional-de-la-soja-en-2025-26-consolida-el-rol-crucial-de-la-zona-central/"},
  {"fecha":"2026-06-12","fuente":"Agrositio","cultivo":"Maíz / Soja","titulo":"La cosecha de soja con precio puesto en mínimos y el maíz con récord de descargas","resumen":"La BCR informa que solo el 21% de la cosecha de soja 2025/26 tiene precio en firme —mínimo histórico desde 1994/95—: 10,4 Mt con precio cerrado y 7,6 Mt pendientes de fijación; los precios en Chicago por debajo de la media histórica desincentivan la venta. Las descargas de maíz en el Gran Rosario acumulan 13 Mt en el año (+25% vs 2025, récord estacional), aunque el ritmo aminora ante la llegada del tardío; 33% de la producción de maíz ya tiene precio, proporción máxima en cuatro años. Los fondos especulativos liquidaron más de 830.000 contratos agro en Chicago —mayor posición comprada de la historia—, presionando soja -5% y maíz a mínimos de octubre 2025.","link":"https://www.agrositio.com.ar/noticia/246797-la-cosecha-de-soja-con-precio-puesto-en-minimos.html"},
  {"fecha":"2026-06-12","fuente":"Agrositio","cultivo":"Trigo / Maíz / Soja","titulo":"Informe USDA: Oferta cómoda en maíz y soja frente a un trigo con mayor soporte","resumen":"El WASDE de junio elevó la producción mundial de trigo 2026/27 a 820 Mt con demanda en 824,6 Mt; los stocks de EE.UU. se recortaron a 20,25 Mt. Para maíz, los stocks mundiales 2026/27 subieron de 309,2 a 312,4 Mt; futuros julio cayeron debajo de US$4,15/bu. En soja, los stocks mundiales se mantuvieron en 124,9 Mt sin cambios; producción rusa de trigo elevada en 2 Mt a 88 Mt, y la australiana recortada en 2 Mt a 28 Mt.","link":"https://www.agrositio.com.ar/noticia/246777-informe-usda-oferta-comoda-en-maiz-y-soja-frente-a-un-trigo-con-mayor-soporte.html"},
  {"fecha":"2026-06-12","fuente":"Agrositio","cultivo":"Trigo / Maíz / Soja","titulo":"INTA Clima: El Niño confirmado para el año y cuenca del Plata con altas chances de excesos hídricos","resumen":"El INTA confirmó oficialmente la ocurrencia de El Niño para lo que resta de 2026, proyectando lluvias por encima de lo normal en la cuenca del Plata —ríos Paraná, Paraguay y Uruguay. El escenario habilita siembras tempranas, alta densidad y doble cultivo para aprovechar la mayor disponibilidad hídrica, pero implica riesgo de anegamientos en zonas bajas; el monitoreo de humedad de suelo y reservorios naturales es clave para anticipar decisiones productivas.","link":"https://www.agrositio.com.ar/noticia/246776-inta-clima-el-nino-confirmado-para-el-ano-y-cuenca-del-plata-con-altas-chances-de-excesos-hidricos.html"},
  {"fecha":"2026-06-11","fuente":"Agrositio","cultivo":"Trigo","titulo":"Clima: las lluvias de junio con 21 mm en 10 días reactivan Trigo que ya cubre 52% de 6,5 MHa","resumen":"Los primeros 10 días de junio promediaron 21 mm en la región núcleo tras casi 5 semanas sin lluvias importantes; el oeste superó los pronósticos (Pozo del Molle 85 mm, Laboulaye 62 mm, Gral. Villegas 42 mm). El trigo 2026/27 avanzó al 52% de avance sobre 6,5 MHa proyectadas, solo 2 p.p. bajo el promedio histórico: SE Córdoba lidera con 75% implantado, centro-sur Santa Fe al 70%. El noroeste bonaerense (25%) y noreste de Buenos Aires (15%) acusan rezago por excesos hídricos.","link":"https://www.agrositio.com.ar/noticia/246771-clima-las-lluvias-de-junio-con-21-mm-en-10-dias-reactivan-trigo-que-ya-cubre-52-de-65-mha.html"},
  {"fecha":"2026-06-13","fuente":"Bichos de Campo","cultivo":"Trigo / Maíz","titulo":"Los precios de los fertilizantes nitrogenados siguen cayendo, pero el fósforo se muestra aún reacio a convalidar bajas","resumen":"La urea CFR Argentina cayó a US$500–530/t (mayorista US$610–630/t), una baja acumulada de US$340/t desde el máximo de abril; hay señales de reactivación de importaciones apuntando a embarques de julio. India licitó 1,7 Mt con ofertas récord de 5,8–6,2 Mt de 33 proveedores; China reinstauró un piso de US$500–510/t FOB exclusivo para India el 9/jun, desplazando la adjudicación hacia Rusia y Omán. El DAP/MAP se mantiene en US$910–940/t CFR (mayorista US$970–990/t, unos US$100–130/t sobre paridad de importación); los productores argentinos recortan dosis de fosfatados para la campaña fina, generando incertidumbre sobre el consumo real del ciclo de invierno.","link":"https://bichosdecampo.com/los-precios-de-los-fertilizantes-nitrogenados-siguen-cayendo-pero-el-fosforo-se-muestra-aun-reacio-a-convalidar-bajas/"},
  {"fecha":"2026-06-12","fuente":"Bichos de Campo","cultivo":"Maíz / Soja","titulo":"Barajar y dar de nuevo: Los fondos especulativos liquidaron todas sus posiciones compradas en maíz","resumen":"Según datos de la CFTC publicados el 12/jun, los fondos especulativos alcanzaron posición neta neutra en maíz en Chicago al cierre del martes 9/jun, completando la liquidación de todas las posiciones compradas acumuladas desde principios de año: la presión vendedora de los fondos deja de operar como factor bajista adicional en ese cereal. En soja, los fondos aún mantienen un volumen significativo de posiciones compradas sin liquidar, por lo que la toma de ganancias podría continuar si no emerge un nuevo catalizador alcista. El factor financiero sigue dominando por encima de los fundamentos agrícolas.","link":"https://bichosdecampo.com/barajar-y-dar-de-nuevo-los-administradores-de-fondos-agricolas-terminaron-de-liquidar-todas-las-posiciones-compradas-en-maiz/"},
  {"fecha":"2026-06-11","fuente":"La Nacion Campo","cultivo":"Maíz / Soja","titulo":"La soja en el mercado internacional tiene el peor precio en cuatro meses y el maíz en mínimos en ocho meses","resumen":"La posición julio de la soja en Chicago cerró el 11/jun en US$409,69/t, mínimo desde el 5 de febrero, mientras el maíz alcanzó sus valores más bajos en ocho meses (US$162,10/t). El USDA publicó su informe mensual: elevó la estimación de cosecha de soja argentina a 50 Mt y de Brasil a 180 Mt, con existencias mundiales de maíz en 281,22 Mt. Los fondos especulativos continúan deshaciendo posiciones compradas acumuladas desde principios de año. El clima favorable en EE.UU. reduce el riesgo productivo para la nueva campaña, y China sigue sin mostrar señales claras de compras de soja, presionando las cotizaciones a la baja.","link":"https://www.lanacion.com.ar/economia/campo/la-soja-en-el-mercado-internacional-esta-en-el-peor-precio-en-cuatro-meses-y-el-maiz-en-minimos-en-nid11062026/"},
  {"fecha":"2026-06-11","fuente":"Bichos de Campo","cultivo":"Trigo / Maíz / Soja","titulo":"¿Salió el informe del USDA? Eso ya no importa porque los precios de los commodities agroindustriales están determinados por factores financieros","resumen":"El USDA publicó su informe mensual recortando la estimación de cosecha de trigo de EE.UU. 2026/27 a 42,0 Mt (desde 42,4 Mt) y manteniendo la oferta exportable en 21,0 Mt, lo que generó alzas moderadas en trigo Kansas. Sin embargo, el factor financiero continúa dominando: el Banco Central Europeo subió tasas 25 pb a 2,25% para contener la inflación energética del conflicto en Medio Oriente, y la inflación mayorista de EE.UU. en mayo alcanzó 6,5% (máximo desde nov 2022). Se descuenta que el presidente de la Fed, Kevin Warsh, no subirá las tasas el 17/jun (tasa actual: 3,5-3,75%), aunque el mercado de bonos anticipa lo contrario. La alta volatilidad financiera sigue eclipsando los fundamentos agrícolas en la formación de precios de granos.","link":"https://bichosdecampo.com/salio-el-informe-del-usda-eso-ya-no-importa-porque-los-precios-de-los-commodities-agroindustriales-estan-determinados-por-factores-financieros/"},
  {"fecha":"2026-06-11","fuente":"Agrositio","cultivo":"Trigo / Maíz / Soja","titulo":"USDA, costos de fertilizantes y el nuevo impulso a las estimaciones de trigo y soja en Argentina","resumen":"Con el informe mensual del USDA publicado el 11/jun, el mercado espera ajustes menores en oferta/demanda. La Bolsa de Comercio de Rosario elevó su estimación de producción de trigo a 20 Mt y de soja a 51,5 Mt para el ciclo 2025/26 de Argentina. En maíz persiste la estacionalidad bajista, con operadores reduciendo posiciones compradas. Los altos costos de fertilizantes en EE.UU. llevaron a productores a reconsiderar rotaciones de cultivos. El mercado espera definiciones más claras hacia fines de junio para confirmar el rumbo de los granos.","link":"https://www.agrositio.com.ar/noticia/246758-usda-costos-de-fertilizantes-y-el-nuevo-impulso-a-las-estimaciones-de-trigo-y-soja-en-argentina.html"},
  {"fecha":"2026-06-11","fuente":"Infocampo","cultivo":"Trigo","titulo":"Expectativas renovadas para el trigo: la urea sigue bajando y la siembra recupera hectáreas","resumen":"La Bolsa de Comercio de Rosario elevó la intención de siembra de trigo 2026/27 a 6,82 millones de hectáreas (+160.000 ha vs. estimación previa), proyectando 20 Mt con clima normal. La urea bajó de su pico de US$1.000/t a un rango de US$800-850/t, reduciendo la relación trigo/urea de 45,8 qq/ha a 34,5 qq/ha —máximo alivio desde 2013. La rentabilidad unitaria del cereal sigue negativa, pero la rotación trigo + soja de 2ª arroja US$66/ha de margen (9,5% de retorno). Lluvias de 10 a 45 mm en regiones clave durante junio consolidaron reservas hídricas; el proyectado Súper Niño de fin de año suma expectativas alcistas para la próxima campaña.","link":"https://www.infocampo.com.ar/expectativas-renovadas-para-el-trigo-la-urea-sigue-bajando-y-la-siembra-recupera-hectareas/"},
  {"fecha":"2026-06-10","fuente":"Bichos de Campo","cultivo":"Trigo / Maíz / Soja","titulo":"Números muy justos: sólo sobrevive quien pone el motor a andar continuamente arriba de 10.000 vueltas","resumen":"El productor y asesor Alejandro Ladaga describe márgenes extremadamente ajustados en la zona núcleo a pesar de una campaña 2025/26 excepcional: maíz promedió 105 qq/ha (18 qq sobre histórico), soja superó el promedio y el trigo rindió ~62 qq/ha. Sin embargo, para la próxima campaña reducirá un 20% el área de trigo/cebada: el cereal exige 48 qq/ha de rinde de indiferencia en campos alquilados y el maíz demanda inversiones de ~900 USD/ha. La volatilidad de la urea —que varía US$10–20/t por día— complica la planificación, y Ladaga exige una reducción de retenciones más rápida e intensa a la anunciada por el gobierno.","link":"https://bichosdecampo.com/numeros-muy-justos-para-el-productor-y-asesor-alejandro-ladaga-solo-sobrevive-quien-pone-el-motor-a-andar-continuamente-arriba-de-10-000-vueltas-y-con-tacometro-en-rojo/"},
  {"fecha":"2026-06-10","fuente":"Bichos de Campo","cultivo":"Soja","titulo":"Soja de fiesta: Se siguen negociando en el mercado argentino precios superiores a los de la capacidad teórica de pago de la industria","resumen":"La Soja Rosario disponible cerró en US$326,5/t (+1,5% intradiario) y el contrato Jul 26 en US$329,5/t (+0,9%), ambos por encima de la capacidad teórica de pago de la industria (US$325/t). La demanda aceitera urgente —que necesita programar embarques— sigue forzando precios al alza. Los productores prefieren vender maíz para generar caja y retienen soja como reserva de valor. En los dos últimos días se declararon DJVE de harina de soja por más de 1,4 Mt; a la vez, las exportadoras brasileñas desaceleran sus embarques en junio, redirigiendo negocios a los puertos argentinos. La firmeza de precios es inédita en plena cosecha.","link":"https://bichosdecampo.com/soja-de-fiesta-se-siguen-negociando-en-el-mercado-argentino-precios-superiores-a-los-de-la-capacidad-teorica-de-pago-de-la-industria/"},
  {"fecha":"2026-06-10","fuente":"Bichos de Campo","cultivo":"Trigo / Maíz / Soja","titulo":"Recuperación parcial de los precios del trigo, el maíz y la soja de mano del repunte del valor internacional del petróleo","resumen":"Los futuros en Chicago revirtieron la tendencia bajista el miércoles 10/jun impulsados por el alza del petróleo, a raíz de nuevos ataques de EE.UU. contra buques iraníes en el Golfo de Omán. La soja lideró la recuperación, arrastrada por el aceite que se fortalece ante la mayor competitividad de los biocombustibles. La inflación en EE.UU. subió a 4,2% anual en mayo (vs 3,8% en abril), pero el mercado descuenta que el presidente de la Fed Kevin Warsh —designado por Trump— no subirá tasas el 17/jun ni en el resto de 2026. El contexto macro/financiero sigue dominando la formación de precios de granos por encima de los fundamentos propios del mercado agrícola.","link":"https://bichosdecampo.com/recuperacion-parcial-de-los-precios-del-trigo-el-maiz-y-la-soja-de-mano-del-repunte-del-valor-internacional-del-petroleo/"},

  {"fecha":"2026-06-09","fuente":"Bichos de Campo","cultivo":"Maíz / Trigo / Soja","titulo":"Sigue sumando puntos la proyección de la llegada de un «Súper Niño» a fines del presente año","resumen":"El CPC-NOAA actualizó su pronóstico ENSO: el modelo climático CFS.v2 proyecta condiciones de «Súper Niño» para el último trimestre de 2026, con persistencia hasta el segundo semestre de 2027. El fenómeno podría tener intensidad extraordinaria, aunque comenzaría a moderarse a principios de 2027. Para el NEA y la región pampeana argentina —así como Uruguay, Paraguay y sur de Brasil—, los eventos Niño suelen asociarse a lluvias superiores al promedio y rendimientos agrícolas elevados. Este pronóstico refuerza las perspectivas positivas para la siembra de maíz 2026/27 en la zona núcleo, aunque el riesgo de excesos hídricos e inundaciones localizadas es un factor clave a monitorear durante la implantación.","link":"https://bichosdecampo.com/sigue-sumando-puntos-la-proyeccion-de-la-llegada-de-un-super-nino-a-fines-del-presente-ano/"},

/* ═══════════════════════════════════════════════════════════════════════ */

var currentFilter = 'todos';

function setFilter(crop) {
  currentFilter = crop;
  ['todos','trigo','maiz','soja'].forEach(function(c) {
    var el = document.getElementById('chip-' + c);
    if (el) el.classList.toggle('active', c === crop);
  });
  render();
}

function render() {
  var container = document.getElementById('news-container');
  var countEl   = document.getElementById('filter-count');
  var updateEl  = document.getElementById('update-date');
  var cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 7);

  var items = NEWS_DATA.filter(function(n) {
    var d = new Date(n.fecha);
    if (d < cutoff) return false;
    if (currentFilter === 'todos') return true;
    return n.cultivo.toLowerCase().indexOf(currentFilter) >= 0;
  });

  if (countEl) countEl.textContent = items.length + ' nota' + (items.length !== 1 ? 's' : '');
  if (updateEl && NEWS_DATA.length > 0) updateEl.textContent = NEWS_DATA[0].fecha;

  if (items.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🌿</div><p>No hay noticias para el filtro seleccionado.</p></div>';
    return;
  }

  var html = '<div class="news-list">';
  var lastDate = '';

  items.forEach(function(n) {
    var colorClass = n.cultivo.indexOf('/') >= 0 ? 'c-multi'
      : n.cultivo.toLowerCase().indexOf('trigo') >= 0 ? 'c-trigo'
      : (n.cultivo.toLowerCase().indexOf('maíz') >= 0 || n.cultivo.toLowerCase().indexOf('maiz') >= 0) ? 'c-maiz'
      : n.cultivo.toLowerCase().indexOf('soja') >= 0 ? 'c-soja' : '';

    var tagClass = n.cultivo.indexOf('/') >= 0 ? 'tag-multi'
      : n.cultivo.toLowerCase().indexOf('trigo') >= 0 ? 'tag-trigo'
      : (n.cultivo.toLowerCase().indexOf('maíz') >= 0 || n.cultivo.toLowerCase().indexOf('maiz') >= 0) ? 'tag-maiz'
      : n.cultivo.toLowerCase().indexOf('soja') >= 0 ? 'tag-soja' : 'tag-gen';

    var daysAgo = Math.floor((new Date() - new Date(n.fecha)) / 86400000);
    var age = daysAgo === 0 ? 'Hoy' : daysAgo === 1 ? 'Ayer' : 'Hace ' + daysAgo + ' días';
    var isFresh = daysAgo <= 1;

    if (n.fecha !== lastDate) {
      var label = daysAgo === 0 ? 'Hoy' : daysAgo === 1 ? 'Ayer'
        : new Date(n.fecha + 'T00:00:00').toLocaleDateString('es-AR', {weekday:'long', day:'numeric', month:'long'});
      html += '<div class="date-divider">' + label + '</div>';
      lastDate = n.fecha;
    }

    var resumen = n.resumen.length > 220 ? n.resumen.slice(0, 220).replace(/\s\S+$/, '') + '…' : n.resumen;

    html += '<div class="news-card ' + colorClass + '">'
      + '<div class="card-meta">'
      + '<span class="card-fecha">' + n.fecha + '</span>'
      + '<span class="card-fuente">' + n.fuente + '</span>'
      + '<span class="card-cultivo ' + tagClass + '">' + n.cultivo + '</span>'
      + '<span class="age-badge' + (isFresh ? ' fresh' : '') + '">' + age + '</span>'
      + '</div>'
      + '<div class="card-titulo">' + n.titulo + '</div>'
      + '<div class="card-resumen">' + resumen + '</div>'
      + '<div class="card-footer"><a class="btn-ver-nota" href="' + n.link + '" target="_blank" rel="noopener">Ver nota →</a></div>'
      + '</div>';
  });

  html += '</div>';
  container.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', render);

</script>
</body>
</html>
