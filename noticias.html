<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A3 Mercados — Noticias</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f0f2f5;
  color: #1a1a2e;
  min-height: 100vh;
}

/* ── Header ── */
.header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  color: white;
  padding: 18px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}
.header-left h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: 0.5px; }
.header-left .sub { font-size: 0.75rem; opacity: 0.55; margin-top: 3px; }
.header-right { text-align: right; }
.header-right .update-label { font-size: 0.68rem; opacity: 0.45; }
.header-right .update-date  { font-size: 0.8rem; opacity: 0.75; margin-top: 2px; }

/* ── Barra de filtros ── */
.filter-bar {
  background: #16213e;
  padding: 10px 24px;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.filter-chip {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.15);
  background: transparent;
  color: rgba(255,255,255,0.5);
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.filter-chip:hover { color: rgba(255,255,255,0.85); border-color: rgba(255,255,255,0.35); }
.filter-chip.active               { background: #4ecdc4; color: #1a1a2e; border-color: #4ecdc4; }
.filter-chip.chip-trigo.active    { background: #fcd34d; color: #1a1a2e; border-color: #fcd34d; }
.filter-chip.chip-maiz.active     { background: #86efac; color: #1a1a2e; border-color: #86efac; }
.filter-chip.chip-soja.active     { background: #93c5fd; color: #1a1a2e; border-color: #93c5fd; }
.filter-count { margin-left: auto; font-size: 0.72rem; color: rgba(255,255,255,0.3); }

/* ── Contenido ── */
.content {
  padding: 20px 24px;
  max-width: 780px;
  margin: 0 auto;
}
@media (max-width: 600px) { .content { padding: 14px 12px; } }

/* ── Estado vacío ── */
.empty-state { text-align: center; padding: 60px 20px; color: #aaa; }
.empty-state .icon { font-size: 2.8rem; margin-bottom: 12px; }
.empty-state p { font-size: 0.88rem; }

/* ── Lista de noticias (columna única) ── */
.news-list { display: flex; flex-direction: column; gap: 14px; }

/* ── Card ── */
.news-card {
  background: white;
  border-radius: 12px;
  padding: 18px 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  display: flex;
  flex-direction: column;
  gap: 10px;
  border-left: 4px solid #e8eaed;
  transition: box-shadow 0.15s, transform 0.1s;
}
.news-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.10); transform: translateY(-1px); }
.news-card.c-trigo { border-left-color: #f59e0b; }
.news-card.c-maiz  { border-left-color: #22c55e; }
.news-card.c-soja  { border-left-color: #3b82f6; }
.news-card.c-multi { border-left-color: #8b5cf6; }

/* ── Meta de la card ── */
.card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.card-fecha { font-size: 0.72rem; color: #999; white-space: nowrap; }
.card-fuente {
  font-size: 0.72rem; font-weight: 700;
  background: #f0f2f5; color: #444;
  padding: 2px 9px; border-radius: 20px; white-space: nowrap;
}
.card-cultivo {
  font-size: 0.7rem; font-weight: 700;
  padding: 2px 9px; border-radius: 20px; white-space: nowrap;
}
.tag-trigo { background: #fef3c7; color: #92400e; }
.tag-maiz  { background: #dcfce7; color: #166534; }
.tag-soja  { background: #dbeafe; color: #1e3a8a; }
.tag-multi { background: #ede9fe; color: #4c1d95; }
.tag-gen   { background: #f3f4f6; color: #6b7280; }

.age-badge { font-size: 0.68rem; color: #bbb; margin-left: auto; white-space: nowrap; }
.age-badge.fresh { color: #16a34a; font-weight: 700; }

/* ── Cuerpo ── */
.card-titulo {
  font-size: 0.92rem;
  font-weight: 700;
  line-height: 1.45;
  color: #1a1a2e;
}
.card-resumen {
  font-size: 0.82rem;
  color: #4b5563;
  line-height: 1.65;
}

/* ── Footer ── */
.card-footer { padding-top: 2px; }
.btn-ver-nota {
  display: inline-block;
  background: #1a1a2e;
  color: white;
  font-size: 0.78rem;
  font-weight: 600;
  padding: 7px 18px;
  border-radius: 8px;
  text-decoration: none;
  transition: background 0.15s;
  font-family: inherit;
}
.btn-ver-nota:hover { background: #2d3a5e; }

/* ── Separador de fecha ── */
.date-divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 6px 0 2px;
  color: #9ca3af;
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.6px;
}
.date-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #e5e7eb;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>📰 Noticias del campo</h1>
    <div class="sub">🌾 Trigo · 🌽 Maíz · 🫘 Soja — últimos 7 días</div>
  </div>
  <div class="header-right">
    <div class="update-label">🔄 Última actualización</div>
    <div class="update-date" id="update-date">—</div>
  </div>
</div>

<div class="filter-bar">
  <button class="filter-chip active"     onclick="setFilter('todos')" id="chip-todos">🌿 Todos</button>
  <button class="filter-chip chip-trigo" onclick="setFilter('trigo')" id="chip-trigo">🌾 Trigo</button>
  <button class="filter-chip chip-maiz"  onclick="setFilter('maiz')"  id="chip-maiz">🌽 Maíz</button>
  <button class="filter-chip chip-soja"  onclick="setFilter('soja')"  id="chip-soja">🫘 Soja</button>
  <span class="filter-count" id="filter-count"></span>
</div>

<div class="content">
  <div id="news-container"></div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════
   NEWS_DATA — Claude actualiza este bloque cada vez que corre el scraping.
   Las noticias con más de 7 días son eliminadas automáticamente del array.
   Última actualización: 2026-07-21
   ═══════════════════════════════════════════════════════════════════════ */
const NEWS_DATA = [
  {fecha:'2026-07-20',fuente:'Infobae',cultivo:'Soja / Maíz',titulo:'Agrodólares: la liquidación del campo viene más lenta pese a la mejora de precios internacionales',resumen:'Según la Bolsa de Comercio de Rosario, las ventas totales de soja alcanzan el 42% de la producción esperada, un 8% por debajo del promedio de los últimos seis años para esta altura de la campaña (50,2%), con apenas el 27,2% de la producción con precio fijado frente a un promedio histórico de 34,5%. La Secretaría de Agricultura ubicó las ventas totales en 21,6 millones de toneladas al 8 de julio, con 14 millones de toneladas ya con precio y 7,6 millones aún sin fijar. Ciara-CEC informó que en el primer semestre las empresas del sector liquidaron exportaciones por USD 13.351 millones, un 13% menos que en igual período de 2025. En julio la soja tocó los precios más altos desde mayo de 2024 (unos USD 440 por tonelada) tras un informe del USDA que redujo más de lo esperado los stocks finales de soja (8,4 millones de toneladas, contra 9 millones proyectados por el mercado) y de maíz (45,4 millones de toneladas, contra 47,5 millones esperados) en Estados Unidos, además de una caída de un punto en la calidad de los cultivos estadounidenses de soja (64% bueno/excelente). Los fondos especulativos pasaron de una posición neta vendida a una comprada de 1,3 millones de toneladas de soja en Chicago, en un contexto de rumores de nuevas compras chinas. Analistas como Salvador Di Stefano y Max Capital coinciden en que, bajo este cuadro de precios relativos y altos costos internos (el gasoil subió 37,5% entre diciembre y junio), el productor no liquidará en forma masiva, lo que podría presionar al alza el tipo de cambio.',link:'https://www.infobae.com/economia/2026/07/20/agrodolares-por-que-viene-lenta-la-liquidacion-del-campo-y-como-puede-influir-en-el-tipo-de-cambio/'},
  {fecha:'2026-07-19',fuente:'Infobae (Revista Chacra)',cultivo:'Trigo / Maíz',titulo:'La siembra de trigo entra en su tramo final mientras avanzan la cosecha de maíz y sorgo',resumen:'Según la Bolsa de Cereales de Buenos Aires, la siembra de trigo 2026/27 alcanzó el 92% de las 6,5 millones de hectáreas proyectadas, con un avance semanal de cuatro puntos porcentuales, aunque persisten demoras en el centro y sur del área agrícola por excesos de humedad. El 96% de los lotes se desarrolla bajo condiciones hídricas adecuadas a óptimas, con el 56,2% del cultivo en expansión foliar y el 9,5% macollando, avance liderado por el NOA. En paralelo, la cosecha de maíz con destino comercial llegó al 62,2% del área apta, con un rinde promedio de 80,6 quintales por hectárea -encabezado por el Núcleo Norte con 97,2 quintales-, aunque con un retraso interanual de 8,2 puntos porcentuales por la elevada humedad de los granos. Se mantiene la proyección de una producción nacional de maíz de 64 millones de toneladas, 30,6% más que en la campaña anterior. La cosecha de sorgo, por su parte, ya cubre el 80,8% del área apta con un rendimiento promedio de 42,1 quintales por hectárea, sosteniendo la estimación de 2,9 millones de toneladas.',link:'https://www.infobae.com/revista-chacra/2026/07/19/la-siembra-de-trigo-entra-en-su-tramo-final-mientras-avanzan-la-cosecha-de-maiz-y-sorgo/'},
  {fecha:'2026-07-18',fuente:'Bichos de Campo',cultivo:'Trigo',titulo:'Un estado clave de Australia proyecta un recorte del 28,5% en su cosecha de trigo por la falta de lluvias',resumen:'El Departamento de Agricultura de Western Australia -uno de los principales estados productores del país- proyectó una cosecha de trigo de 9,5 millones de toneladas para este año, frente a 13,3 millones en 2025, una caída del 28,5% atribuida a restricciones hídricas. El propio informe agroclimático australiano indica que en la semana finalizada el 15 de julio gran parte de las regiones cerealeras permanecían secas, con la fase ENSO "El Niño" vigente asociada históricamente a lluvias inferiores a las normales en las zonas agrícolas del país. Con este panorama, la proyección del USDA para la cosecha total australiana (28 millones de toneladas) luce desactualizada frente a la última estimación oficial de Abares, de 26,7 millones de toneladas a comienzos de junio, cifra que se espera sea revisada a la baja. Australia es en condiciones normales el cuarto exportador mundial de trigo, detrás de Rusia, la Unión Europea y Canadá, por lo que un recorte de esta magnitud es un factor alcista para el mercado internacional del cereal.',link:'https://bichosdecampo.com/diganle-adios-al-trigo-australiano-que-se-va-uno-de-los-principales-estados-agricola-de-esa-nacion-espera-un-recorte-de-produccion-del-285/'},
  {fecha:'2026-07-16',fuente:'Bichos de Campo',cultivo:'Soja',titulo:'LDC ratificó ante Milei la construcción de una planta de molienda de girasol y soja de US$400 millones en Bahía Blanca',resumen:'El presidente Javier Milei recibió en Casa Rosada a la presidenta de Louis Dreyfus Company (LDC), Margarita Louis-Dreyfus, junto al CEO global Michael Gelchie y el director para Latinoamérica Juan José Blanchard, en un encuentro del que también participaron el ministro Luis Caputo y el secretario Sergio Iraeta. El eje de la reunión fue el proyecto de una nueva planta de procesamiento de girasol y soja en Bahía Blanca, con una inversión estimada en US$400 millones y capacidad de molienda de hasta 4.000 toneladas diarias, cuya construcción comenzaría a fines de 2026. La planta, pese a su magnitud, no califica para el Régimen de Incentivos para Grandes Inversiones (RIGI) por no pertenecer a los sectores considerados "estratégicos" definidos por el Gobierno (energía, minería, infraestructura, tecnología, forestoindustria, turismo, siderurgia y petróleo y gas). LDC viene sumando otras inversiones en el país, entre ellas un centro logístico de algodón en Zárate y la compra de un acopio con puerto para barcazas en Santa Elena, Entre Ríos.',link:'https://bichosdecampo.com/milei-recibio-a-la-presidenta-de-ldc-margarita-louis-dreyfus-un-gran-paso-para-que-pueda-conocer-el-rol-estrategico-del-agro-argentino/'},
  {fecha:'2026-07-17',fuente:'Bichos de Campo',cultivo:'Trigo / Maíz / Soja',titulo:'Los fondos agrícolas aceleran sus apuestas alcistas en trigo, maíz y soja en el CME Group',resumen:'Según los datos de la Commodity Futures Trading Commission difundidos el 17 de julio, la posición neta especulativa en contratos futuros y opciones de maíz en el CME Group ("Chicago") se duplicó el martes respecto de la semana anterior, mientras la posición neta "comprada" de los fondos agrícolas en soja subió un 12% en términos intersemanales; en trigo los inversores especulativos también se mantienen mayormente "comprados". El posicionamiento alcista se da en un contexto de problemas productivos en distintas regiones clave, con los envíos de cereales por el mar de Azov interrumpidos por ataques con drones ucranianos contra rutas marítimas rusas y los puertos ucranianos bajo ataque de drones rusos, a lo que se suma la demora de la cosecha sudamericana de maíz por excesos de humedad y un panorama climático desafiante ante la probable ocurrencia de un fuerte fenómeno de El Niño.',link:'https://bichosdecampo.com/combo-completo-los-operadores-de-fondos-agricolas-siguen-apostando-por-un-mercado-alcista-para-trigo-maiz-y-soja/'},
  {fecha:'2026-07-17',fuente:'SEPRIN / Infobae',cultivo:'Trigo / Soja / Maíz',titulo:'En la apertura de la Rural, el Gobierno prometió al campo seguir bajando la presión impositiva sobre los granos',resumen:'El jefe de Gabinete, Diego Santilli, participó del corte de cintas de la 138° Exposición Rural -que se extiende hasta el domingo 26 de julio, con la presencia confirmada de Javier Milei en el cierre- y afirmó que "este año vamos a terminar bajando dos puntos los derechos de exportación para el trigo y la cebada", recordando que desde junio esas retenciones ya bajaron del 7,5% al 5,5%. Según el cronograma oficial, a partir de 2027 la rebaja se extenderá a maíz, girasol, sorgo y soja, que iría reduciéndose entre 0,25 y 0,5 puntos porcentuales mensuales desde el 24% actual hasta el 21% a fines de 2027, con una baja mensual de medio punto para todos los productos alcanzados a partir de 2028. Santilli remarcó que la presión fiscal total cerrará el año en el 26,7% del PBI, contra el 32,6% de la gestión anterior.',link:'https://www.seprin.info/2026/07/17/en-la-apertura-de-la-exposicion-rural-el-gobierno-prometio-al-campo-seguir-bajando-la-presion-impositiva/'},
  {fecha:'2026-07-17',fuente:'Bichos de Campo',cultivo:'Maíz',titulo:'Alerta por tormentas intensas con eventual granizo en la zona pampeana agrava el atraso de la cosecha de maíz',resumen:'El Servicio Meteorológico Nacional emitió esta mañana un alerta por tormentas fuertes con lluvias intensas, ráfagas y eventual caída de granizo sobre sectores del centro y noreste de la provincia de Buenos Aires, con el frente extendiéndose hasta el sábado sobre Uruguay, el Litoral y el centro-norte bonaerense, y un regreso de las lluvias el lunes. Más allá de los posibles daños productivos, el fenómeno agrava el retraso de la cosecha de maíz por excesos de humedad: la Bolsa de Cereales de Buenos Aires informó que en la zona centro de Buenos Aires se había recolectado el 50,8% del área (restan levantar más de 170.000 hectáreas), en la Cuenca del Salado el 60,8% (faltan 37.000 hectáreas) y en el sudeste bonaerense apenas el 44,5% (restan casi 286.000 hectáreas).',link:'https://bichosdecampo.com/muy-malo-para-el-maiz-alerta-por-tormentas-intensas-con-eventual-granizo-en-la-zona-pampeana/'},
  {fecha:'2026-07-16',fuente:'Bichos de Campo',cultivo:'Trigo',titulo:'El pronóstico de lluvias torrenciales para el segundo semestre enciende alarmas por la calidad del trigo 2026/27 en la región',resumen:'El pronóstico de largo plazo del International Research Institute for Climate and Society (Columbia Climate School) proyecta para agosto-octubre lluvias superiores a lo normal en gran parte de Paraná, responsable de cerca del 40% del trigo brasileño, y extiende el riesgo de excesos hídricos hacia Rio Grande do Sul (otro 40% de la oferta) para los trimestres siguientes. El organismo oficial Conab ya había advertido que ese escenario climático puede derivar en problemas de calidad panadera por granos brotados y fusarium. La mala noticia es que el mismo pronóstico alcanza también a Uruguay y gran parte de la zona pampeana argentina, por lo que el monitoreo y la segregación de partidas de alta calidad panadera volverán a ser clave en el ciclo 2026/27, como ya ocurrió en la campaña previa.',link:'https://bichosdecampo.com/todo-indica-que-la-campana-regional-de-trigo-2026-27-estara-marcada-por-problemas-de-calidad-derivados-de-excesos-hidricos/'},
  {fecha:'2026-07-16',fuente:'Bichos de Campo',cultivo:'Maíz',titulo:'Con 22 millones de toneladas de maíz aún por cosechar en la segunda quincena de julio, el mercado local paga premios inusuales',resumen:'La Bolsa de Cereales de Buenos Aires informó que la cosecha de maíz con destino grano comercial alcanza el 62,2% del área nacional, con 41,5 millones de toneladas recolectadas sobre un total estimado de 64 millones, restando levantar más de 22 millones de toneladas por la elevada humedad en los granos y los excesos hídricos en el sur bonaerense. En ese contexto, la posición Maíz Julio 2026 en A3 Mercados cerró el jueves en un promedio de 186,3 US$/tonelada (+0,3%), unos 10 US$/tonelada por encima de la capacidad de pago teórica de la exportación al FOB vigente, y llegó a registrar subas intradiarias pese a un contexto internacional bajista. Al 8 de julio los exportadores habían comprado 29,1 millones de toneladas de maíz 2025/26 pero solo 23,0 millones tenían precio fijado, mientras los embarques programados vía DJVE ya suman 27,1 millones de toneladas.',link:'https://bichosdecampo.com/faltan-recolectar-22-millones-de-toneladas-de-maiz-y-ya-estamos-en-la-segunda-quincena-de-julio-y-los-precios-lo-saben/'},
  {fecha:'2026-07-15',fuente:'Infobae',cultivo:'Trigo / Maíz / Soja',titulo:'El clima vuelve a marcar el rumbo de los granos tras la salida de los fondos de inversión',resumen:'Un informe de la consultora Kimei junto a la Facultad de Ciencias Agrarias de la UNLZ señala que, tras la fuerte volatilidad de junio dominada por movimientos especulativos, los mercados de soja, maíz y trigo volvieron a concentrarse en los fundamentos productivos. La soja en Chicago recuperó terreno desde mínimos de 408 US$/t hasta cerca de 440 US$/t, con el USDA proyectando para 2026/27 una producción global de 441,7 Mt y importaciones chinas de 115 Mt. El maíz pasó de 159 a 172 US$/t tras el recorte del USDA en las existencias finales mundiales a 275 Mt (producción de 1.297 Mt vs. demanda de 1.320 Mt), mientras el trigo subió de 223 a 232 US$/t en el contrato SRW por las dificultades del trigo de invierno estadounidense y la competencia exportadora del Mar Negro, con existencias finales mundiales proyectadas en 272,8 Mt. En Argentina restan sin precio 37,25 Mt de soja, 31,71 Mt de maíz y 7,98 Mt de trigo.',link:'https://www.infobae.com/revista-chacra/2026/07/15/el-clima-vuelve-a-marcar-el-rumbo-de-los-granos/'},
  {fecha:'2026-07-15',fuente:'El Cronista',cultivo:'Soja / Trigo / Maíz',titulo:'La soja vuela en Chicago pero Argentina registra el ritmo de venta más lento en 30 años',resumen:'Pese a precios en dólares un 21% más altos que el año pasado y a la escalada de tensiones en Ormuz que impulsó los contratos de soja en Chicago, la Bolsa de Comercio de Rosario reportó que sobre una cosecha estimada en 51,5 millones de toneladas solo el 42% tiene contrato y apenas el 27% tiene precio fijado, el ritmo de comercialización más bajo desde al menos 1994/95. La BCR atribuye la cautela a tres factores: la caja cubierta gracias a la liquidez generada por otros cultivos, que llevó a usar la soja como reserva de valor; el desplome del trigo a cosecha en Chicago (de 231 a 206 US$/t) que frenó las fijaciones; y la saturación logística por el ingreso masivo del maíz tardío, cuya trilla ya cubre el 71% del área. La liquidación de divisas del complejo sojero apenas roza el 40% del total, contra el 45-50% habitual para esta altura del año desde 2019, lo que reduce el flujo de dólares al mercado cambiario local.',link:'https://www.cronista.com/economia-politica/la-soja-vuela-en-chicago-por-que-argentina-tiene-la-venta-mas-lenta-en-30-anos/'},
  {fecha:'2026-07-14',fuente:'Infocampo',cultivo:'Trigo / Soja / Maíz',titulo:'El trigo tocó su valor más alto desde mayo en Rosario mientras la soja y el maíz también firman subas',resumen:'En la rueda de pizarra de Rosario del 14 de julio, el trigo cotizó a $290.200 la tonelada, la soja a $490.000 y el maíz a $267.500, con el trigo como el cereal de mayor impulso alcista de la semana tras la suspensión rusa de la navegación comercial en el canal Don-Azov por ataques con drones ucranianos contra buques graneleros. Los tres granos respondieron además a la atención del mercado sobre el clima en Estados Unidos, los nuevos datos del USDA y la actividad de los fondos de inversión.',link:'https://www.infocampo.com.ar/precio-del-trigo-hoy-14-julio-2026/'},
  {fecha:'2026-07-14',fuente:'Infobae / Agrositio',cultivo:'Trigo',titulo:'La siembra de trigo aceleró al 87,9% del área proyectada pese a los problemas de piso',resumen:'El Panorama Agrícola Semanal de la Bolsa de Cereales de Buenos Aires ubicó la siembra de trigo 2026/27 en 87,9% de las 6,5 millones de hectáreas previstas, tras un avance semanal de 7 puntos porcentuales que llevó lo implantado a 5,72 millones de hectáreas. El progreso quedó 3,1 puntos por debajo del registrado un año atrás, aunque supera en 12,2 puntos el promedio histórico para esta altura del calendario; el principal obstáculo sigue siendo la falta de piso, con exceso de humedad superficial que impide el paso de sembradoras en numerosos lotes.',link:'https://www.infobae.com/revista-chacra/2026/07/06/se-acelera-la-siembra-d-trigo-y-los-granos-gruesos-entran-en-la-recta-final-de-una-campana-con-altos-rindes/'},
  {fecha:'2026-07-13',fuente:'Farm Progress (USDA)',cultivo:'Soja / Trigo / Maíz',titulo:'Exportadores privados confirmaron nuevas ventas flash de soja y trigo a China y de maíz a destino no revelado',resumen:'El USDA reportó tres ventas flash de exportación anunciadas por privados: 5,0 millones de bushels de soja con destino a China, 4,0 millones de bushels de trigo blando de invierno también a China, y 6,5 millones de bushels de maíz a un destino no revelado. Las operaciones se suman a otras ventas de la semana, entre ellas 3,7 millones de bushels de trigo duro de primavera a Nigeria, en un contexto de mercado atento a la demanda china tras la confirmación previa de compras de soja por parte de COFCO.',link:'https://www.farmprogress.com/marketing/flash-sales'},
  {fecha:'2026-07-13',fuente:'Ruralnet',cultivo:'Trigo / Maíz / Soja',titulo:'El pronóstico hasta el 20 de julio anticipa lluvias y nevadas en Cuyo y Patagonia, y heladas en el centro-este',resumen:'El pronóstico agrometeorológico hasta el 20 de julio prevé lluvias y nevadas de variada intensidad sobre la mayor parte de la Patagonia y el oeste de Cuyo, además de lluvias y chaparrones sobre el Litoral, La Pampa, Buenos Aires y el centro-este y extremo norte del país. Se esperan temperaturas inferiores a 10°C en el centro y sur del territorio, con heladas débiles en el centro-este y heladas moderadas a intensas en la Patagonia, un escenario que mantiene en vilo a los lotes de trigo con problemas de piso por exceso de humedad.',link:'https://ruralnet.com.ar/pronostico-lluvias-20-julio/'},

/* ═══════════════════════════════════════════════════════════════════════ */

var currentFilter = 'todos';

function setFilter(crop) {
  currentFilter = crop;
  ['todos','trigo','maiz','soja'].forEach(function(c) {
    var el = document.getElementById('chip-' + c);
    if (el) el.classList.toggle('active', c === crop);
  });
  render();
}

function render() {
  var container = document.getElementById('news-container');
  var countEl   = document.getElementById('filter-count');
  var updateEl  = document.getElementById('update-date');
  var cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 7);

  var items = NEWS_DATA.filter(function(n) {
    var d = new Date(n.fecha);
    if (d < cutoff) return false;
    if (currentFilter === 'todos') return true;
    return n.cultivo.toLowerCase().indexOf(currentFilter) >= 0;
  });

  if (countEl) countEl.textContent = items.length + ' nota' + (items.length !== 1 ? 's' : '');
  if (updateEl && NEWS_DATA.length > 0) updateEl.textContent = NEWS_DATA[0].fecha;

  if (items.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🌿</div><p>No hay noticias para el filtro seleccionado.</p></div>';
    return;
  }

  var html = '<div class="news-list">';
  var lastDate = '';

  items.forEach(function(n) {
    var colorClass = n.cultivo.indexOf('/') >= 0 ? 'c-multi'
      : n.cultivo.toLowerCase().indexOf('trigo') >= 0 ? 'c-trigo'
      : (n.cultivo.toLowerCase().indexOf('maíz') >= 0 || n.cultivo.toLowerCase().indexOf('maiz') >= 0) ? 'c-maiz'
      : n.cultivo.toLowerCase().indexOf('soja') >= 0 ? 'c-soja' : '';

    var tagClass = n.cultivo.indexOf('/') >= 0 ? 'tag-multi'
      : n.cultivo.toLowerCase().indexOf('trigo') >= 0 ? 'tag-trigo'
      : (n.cultivo.toLowerCase().indexOf('maíz') >= 0 || n.cultivo.toLowerCase().indexOf('maiz') >= 0) ? 'tag-maiz'
      : n.cultivo.toLowerCase().indexOf('soja') >= 0 ? 'tag-soja' : 'tag-gen';

    var daysAgo = Math.floor((new Date() - new Date(n.fecha)) / 86400000);
    var age = daysAgo === 0 ? 'Hoy' : daysAgo === 1 ? 'Ayer' : 'Hace ' + daysAgo + ' días';
    var isFresh = daysAgo <= 1;

    if (n.fecha !== lastDate) {
      var label = daysAgo === 0 ? 'Hoy' : daysAgo === 1 ? 'Ayer'
        : new Date(n.fecha + 'T00:00:00').toLocaleDateString('es-AR', {weekday:'long', day:'numeric', month:'long'});
      html += '<div class="date-divider">' + label + '</div>';
      lastDate = n.fecha;
    }

    var resumen = n.resumen.length > 220 ? n.resumen.slice(0, 220).replace(/\s\S+$/, '') + '…' : n.resumen;

    html += '<div class="news-card ' + colorClass + '">'
      + '<div class="card-meta">'
      + '<span class="card-fecha">' + n.fecha + '</span>'
      + '<span class="card-fuente">' + n.fuente + '</span>'
      + '<span class="card-cultivo ' + tagClass + '">' + n.cultivo + '</span>'
      + '<span class="age-badge' + (isFresh ? ' fresh' : '') + '">' + age + '</span>'
      + '</div>'
      + '<div class="card-titulo">' + n.titulo + '</div>'
      + '<div class="card-resumen">' + resumen + '</div>'
      + '<div class="card-footer"><a class="btn-ver-nota" href="' + n.link + '" target="_blank" rel="noopener">Ver nota →</a></div>'
      + '</div>';
  });

  html += '</div>';
  container.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', render);

</script>
</body>
</html>
