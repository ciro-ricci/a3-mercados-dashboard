function parseChicagoPrices(text){
  // Si viene HTML, hacer strip de tags primero
  if(text.includes('<')){
    text=text.replace(/<[^>]+>/g,' ').replace(/&nbsp;/g,' ').replace(/&#\d+;/g,' ').replace(/&amp;/g,'&').replace(/\s+/g,' ');
  }
  const pN=s=>{s=String(s||'').replace(/[$\s"]/g,'').trim();if(!s||s==='N/A')return null;const ld=s.lastIndexOf('.'),lc=s.lastIndexOf(',');const norm=lc>ld?s.replace(/\./g,'').replace(',','.'):s.replace(/,/g,'');const n=parseFloat(norm);return isNaN(n)?null:n;};
  const mmap={ene:'ENE',feb:'FEB',mar:'MAR',abr:'ABR',may:'MAY',jun:'JUN',jul:'JUL',ago:'AGO',sep:'SEP',oct:'OCT',nov:'NOV',dic:'DIC'};
  const res={};
  for(const line of text.split(/[\n;]/)){
    const m=line.match(/([A-Za-z]{3,4})-(\d{2})\s+([\d\s,.\-+]+)/);
    if(!m)continue;
    const mc=mmap[m[1].toLowerCase()];if(!mc)continue;
    const key=mc+m[2];
    const nums=m[3].trim().split(/\s+/).map(pN).filter(v=>v!==null);
    if(nums.length<2)continue;
    const entry={};let trigoCount=0;
    for(let i=0;i<nums.length-1;i+=2){
      const p=nums[i];
      if(p>900)entry.aceite=p;
      else if(p>370)entry.soja=p;
      else if(p>290)entry.harina=p;
      else if(p>185){if(trigoCount===0){entry.trigo=p;trigoCount++;}else{entry.trigo_kan=p;trigoCount++;}}
      else if(p>120)entry.maiz=p;
    }
    if(Object.keys(entry).length)res[key]=entry;
  }
  return Object.keys(res).length?res:null;
}
function parseChicagoMarkdown(text){
  // Columnas fijas del BCR (precio | variación por par):

  // 5=Maíz, 6=var, 7=Soja, 8=var, 9=Aceite, 10=var, 11=Harina, 12=var
  const COLS={1:'trigo',3:'trigo_kan',5:'maiz',7:'soja',9:'aceite',11:'harina'};
  const pN=s=>{if(!s)return null;s=s.replace(/[$\s"\\]/g,'').trim();if(!s||s==='N/A'||s==='-')return null;const ld=s.lastIndexOf('.'),lc=s.lastIndexOf(',');const norm=lc>ld?s.replace(/\./g,'').replace(',','.'):s.replace(/,/g,'');const n=parseFloat(norm);return isNaN(n)?null:n;};
  const mmap={ene:'ENE',feb:'FEB',mar:'MAR',abr:'ABR',may:'MAY',jun:'JUN',jul:'JUL',ago:'AGO',sep:'SEP',oct:'OCT',nov:'NOV',dic:'DIC'};
  const res={};
  for(const line of text.split('\n')){
    const l=line.trim();

    if(entry.soja||entry.maiz||entry.trigo)res[key]=entry;
  }
  return Object.keys(res).length?res:null;
}

function parseFobFas(text){
  const pN=s=>{if(!s)return null;s=s.replace(/[$\s"\\]/g,'').trim();if(!s||s==='N/A'||s==='-')return null;const ld=s.lastIndexOf('.'),lc=s.lastIndexOf(',');const norm=lc>ld?s.replace(/\./g,'').replace(',','.'):s.replace(/,/g,'');const n=parseFloat(norm);return isNaN(n)?null:n;};
  const pCSV=row=>{const c=[];let cur='',q=false;for(const ch of row+','){if(ch==='"')q=!q;else if(ch===','&&!q){c.push(cur.trim());cur='';}else cur+=ch;}return c;};
  const res={trigo:{},maiz:{},soja:{}};
  const done={trigo:false,maiz:false,soja:false};
  let cult=null;
  let inAceitera=false; // cuando es true, el FAS de soja proviene de la Industria Aceitera (B42) y sobreescribe el de Molinera
  // Detect format: markdown pipe-table vs CSV
  const lines=text.split('\n');
  const isMd=lines.some(l=>l.trim().startsWith('|'));
  for(const line of lines){
    const l=line.trim();
    if(!l)continue;
    // Detectar sección Aceitera antes de parsear celdas (funciona en texto plano y pipe-table)
    if(/aceitera/i.test(l))inAceitera=true;
    let cells,f;
    if(isMd){
      if(!l.startsWith('|'))continue;
      if(/^[|:\s\-]+$/.test(l))continue;
      cells=l.replace(/^\||\|$/g,'').split('|').map(s=>s.replace(/\\/g,'').trim());
    } else {
      cells=pCSV(l);
    }
    f=cells[0]||'';
    if(/commodity/i.test(f)){
      const c1=cells[1]||'';
      if(/trigo|wheat/i.test(c1))cult='trigo';
      else if(/ma[íi]z|corn/i.test(c1))cult='maiz';
      else if(/soja|soybean/i.test(c1))cult='soja';
      else cult=null;
    }
    if(!cult)continue;
    // Para soja en sección Aceitera: permitir sobreescribir el FAS aunque ya esté marcado como done
    const allowFasOverride=cult==='soja'&&inAceitera;
    if(done[cult]&&!allowFasOverride)continue;
    if(/fob.*(comprador|bid)/i.test(f)){const v=pN(cells[1]);if(v&&!done[cult])res[cult].fob=v;}
    if(/fas.*te[oó]rico/i.test(f)){const v=pN(cells[1]);if(v){res[cult].fas=v;if(res[cult].fob)done[cult]=true;}}
  }
  return(res.soja.fob||res.maiz.fob||res.trigo.fob)?res:null;
}

        if(fresh&&Object.keys(fresh).length>0){

      }
    }catch(e){console.warn('[Chicago] MCP Drive error:',e.message);}
  }

  if(!upgraded){

      if(r.ok){
        const t=await r.text();
        if(t&&t.length>50&&!t.trim().startsWith('<')){
          const fresh=parseChicagoSheetCSV(t);
          if(fresh&&Object.keys(fresh).length>0){
            CHICAGO=fresh;

            upgraded=true;
          }

function parseDollarRatesCSV(text){const fl=text.trim().split("\n")[0]||"";if(fl.includes("|"))return null;
  const pRow=row=>{const c=[];let cur='',q=false;for(const ch of row+','){if(ch==='"')q=!q;else if(ch===','&&!q){c.push(cur.trim());cur='';}else cur+=ch;}return c;};
  const lines=text.trim().split(/\r?\n/);if(lines.length<2)return null;
  const hdrs=pRow(lines[0]).map(h=>h.toLowerCase().replace(/['"]/g,'').trim());
  const iTipo=hdrs.findIndex(h=>h.includes('tipo'));
  const iCompra=hdrs.findIndex(h=>h.includes('compra'));
  const iVenta=hdrs.findIndex(h=>h.includes('venta'));
  if(iTipo<0||iVenta<0)return null;
  const pN=s=>{if(!s)return null;s=String(s).replace(/[$\s"]/g,'').trim();const n=parseFloat(s.replace(',','.'));return isNaN(n)?null:n;};
  const res=[];
  for(let i=1;i<lines.length;i++){
    const p=pRow(lines[i]);if(!p[iTipo])continue;
    const tipo=p[iTipo].replace(/['"]/g,'').trim();if(!tipo)continue;
    res.push({tipo,compra:pN(p[iCompra]),venta:pN(p[iVenta])});
  }
  return res.length?res:null;
}
function parseDollarRatesMd(text){
  const res=[];
  for(const line of text.split('\n')){
    const l=line.trim();
    if(!l.startsWith('|'))continue;
    if(/^[|:\s\-]+$/.test(l))continue;
    const cells=l.replace(/^\||\|$/g,'').split('|').map(s=>s.replace(/\\/g,'').trim());
    if(cells.length<3)continue;
    const tipo=cells[0];if(!tipo||/tipo/i.test(tipo))continue;
    const pN=s=>{const n=parseFloat((s||'').replace(',','.'));return isNaN(n)?null:n;};
    res.push({tipo,compra:pN(cells[1]),venta:pN(cells[2])});
  }
  return res.length?res:null;
}

function buildChain(panelId,opts,vencs){

  const futs=panelId==='soj-opts'?SOJ_FUT:panelId==='mai-opts'?MAI_FUT:TRI_FUT;

      const filtered=opts.filter(r=>r.venc_serie===venc);
      if(!filtered.length)return '';

      if(!strikes.length)return '';

const LECAP_MONTH = {E:1,F:2,M:3,A:4,Y:5,J:6,L:7,G:8,S:9,O:10,N:11,D:12};
const LECAP_MES   = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

const PRECIO_FINAL = {
  'S15Y6': 105.18,
  'S29Y6': 132.04,
  'S17L6': 107.92,
  'S31L6': 117.68,
  'S14G6': 108.03,
  'S31G6': 127.06,
  'S30O6': 135.28,
  'S30N6': 129.89,
  'S30S6': 117.536,
};

function decodeLecap(ticker){
  const tipo=ticker[0]==='S'?'LECAP':ticker[0]==='X'?'BONCAP':'Letra';
  const day=parseInt(ticker.substring(1,3));
  const mc=ticker[3];
  const yr=parseInt(ticker[4]);
  const m=LECAP_MONTH[mc];
  if(!m||isNaN(day)||isNaN(yr))return null;
  const year=2020+yr;
  const venc=new Date(year,m-1,day);
  const today=new Date();today.setHours(0,0,0,0);
  const dias=Math.round((venc-today)/(86400000));
  const display=`${day} ${LECAP_MES[m]} ${year}`;
  return{tipo,venc,dias,display,month:m,year};
}

function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);
  if(!lines.length)return{headers:[],rows:[]};
  const parse=line=>{const cols=[];let cur='',inQ=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}else if(c===','&&!inQ){cols.push(cur.trim());cur='';}else cur+=c;}cols.push(cur.trim());return cols;};
  const headers=parse(lines[0]).map(h=>h.replace(/^"|"$/g,'').trim());
  return{headers,rows:lines.slice(1).map(l=>parse(l)).filter(r=>r.length>=headers.length&&r.some(c=>c))};
}

function findCol(headers,...candidates){
  for(const c of candidates){
    const i=headers.findIndex(h=>h.toLowerCase().includes(c.toLowerCase()));
    if(i>=0)return i;
  }
  return -1;
}

// Parsea la hoja LECAP: tabla de 2 columnas (TICKER | PRECIO).
function parseMdLecaps(text){
  const lines=text.split('\n');
  const TICKER_RE=/^[A-Z][A-Z0-9]{4}$/;
  const seen=new Map();
  for(const line of lines){
    const l=line.trim();
    if(!l.startsWith('|'))continue;
    if(/^[|:\s\-]+$/.test(l))continue;
    const cells=l.replace(/^\||\|$/g,'').split('|').map(c=>c.replace(/\\/g,'').trim());
    if(cells.length!==2)continue;
    const ticker=cells[0].toUpperCase();
    const rawPrice=cells[1];
    if(!TICKER_RE.test(ticker))continue;
    if(rawPrice==='#N/A'||rawPrice==='N/A'||rawPrice==='')continue;
    const price=parseFloat(rawPrice.replace(/,/g,'.'));
    if(isNaN(price)||price<=0)continue;
    if(!seen.has(ticker))seen.set(ticker,String(price));
  }
  if(seen.size===0)return null;
  const rows=[...seen.entries()].map(([t,p])=>[t,p,'0']);
  return{headers:['ticker','precio','var'],rows};
}

function extractText(res){
  if(!res)return null;
  if(typeof res==='string')return res;
  if(Array.isArray(res)){
    return res.filter(b=>b.type==='text'||typeof b.text==='string').map(b=>b.text||b).join('');
  }
  if(res.content){
    if(typeof res.content==='string')return res.content;
    if(Array.isArray(res.content))return res.content.filter(b=>b.type==='text'||typeof b.text==='string').map(b=>b.text||b).join('');
  }
  if(res.text)return res.text;
  if(res.body)return res.body;
  return JSON.stringify(res);
}

let lecapSort='tna';

function calcYields(pa,pf,dias){
  if(!pf||!pa||dias<=0)return{rend:null,tna:null,tem:null,tea:null};
  const ratio=pf/pa;
  const rend=(ratio-1)*100;
  const tna=(ratio-1)*(365/dias)*100;
  const tem=(Math.pow(ratio,30/dias)-1)*100;
  const tea=(Math.pow(ratio,365/dias)-1)*100;
  return{rend,tna,tem,tea};
}

function tnaColor(tna){
  if(tna===null)return'#888';
  if(tna>=50)return'#1e7e34';
  if(tna>=35)return'#2e7d32';
  if(tna>=25)return'#b45309';
  return'#cb2431';
}
function tnaBg(tna){
  if(tna===null)return'#f0f2f5';
  if(tna>=50)return'#e6f4ea';
  if(tna>=35)return'#f0faf0';
  if(tna>=25)return'#fef3c7';
  return'#fce8e8';
}

// ── Financiamiento ────────────────────────────────────────────────────
let _finCultivo='soj';
let _finTNA=32;
let _finVA={soj:null,mai:null,tri:null};
let _finModo='pesos';
let _finTasaUsd=7;

function _finSetCultivo(c){_finCultivo=c;buildFinanciamientoPanel();}
function _finSetTNA(v){const n=parseFloat(String(v).replace(',','.'));if(!isNaN(n)&&n>0){_finTNA=n;buildFinanciamientoPanel();}}
function _finSetVA(c,v){
  const raw=String(v||'').replace(/\s/g,'').replace(/\./g,'').replace(',','.');
  const n=parseFloat(raw);
  _finVA[c]=(!v||v===''||isNaN(n)||n<=0)?null:n;
  buildFinanciamientoPanel();
}
function _finSetModo(m){_finModo=m;buildFinanciamientoPanel();}
function _finSetTasaUsd(v){const n=parseFloat(String(v).replace(',','.'));if(!isNaN(n)&&n>=0){_finTasaUsd=n;buildFinanciamientoPanel();}}
function _finGetVA(cult){
  if(_finVA[cult])return _finVA[cult];
  const panelId=cult+'-fut';
  const customArs=window._customSpotArs&&window._customSpotArs[panelId];
  if(customArs)return customArs;
  const cultKey=cult==='soj'?'soja':cult==='mai'?'maiz':'trigo';
  return SPOT?SPOT[cultKey+'_ars']:null;
}
function _finGetVAUsd(cult){
  const cultKey=cult==='soj'?'soja':cult==='mai'?'maiz':'trigo';
  const panelId=cult+'-fut';
  const customArs=window._customSpotArs&&window._customSpotArs[panelId];
  if(customArs&&SPOT&&SPOT.tc)return customArs/SPOT.tc;
  if(!SPOT)return null;
  return SPOT[cultKey+'_usd']||(SPOT.tc&&SPOT[cultKey+'_ars']?SPOT[cultKey+'_ars']/SPOT.tc:null);
}
function _finFindDollarFut(vencDisplay){
  // Match exacto por mes/año: JUL26 → 07/2026, SEP26 → 09/2026, etc.
  if(!DLR_FUT||!DLR_FUT.length)return null;
  const mmap={ENE:'01',FEB:'02',MAR:'03',ABR:'04',MAY:'05',JUN:'06',JUL:'07',AGO:'08',SEP:'09',OCT:'10',NOV:'11',DIC:'12'};
  const m=vencDisplay.match(/^([A-Z]{3})(\d{2})$/);
  if(!m)return null;
  const mon=mmap[m[1]];const yr='20'+m[2];
  if(!mon)return null;
  const target=mon+'/'+yr; // ej: "07/2026"
  return DLR_FUT.find(r=>r.venc_display===target&&r.ajuste&&r.ajuste!=='N/A'&&!isNaN(parseFloat(r.ajuste)))||null;
}
function buildFinanciamientoPanel(){
  const panel=document.getElementById('panel-financiamiento');if(!panel)return;
  const modoBtns=['pesos','dolar'].map(m=>{
    const lbl=m==='pesos'?'\ud83d\udcb5 Pesos':'\ud83d\udcb2 D\u00f3lar';
    const act=m===_finModo;
    return `<button onclick="_finSetModo('${m}')" style="padding:8px 22px;border:2px solid ${act?'#16213e':'#dde'};border-radius:8px;font-size:0.85rem;font-weight:700;cursor:pointer;background:${act?'#16213e':'white'};color:${act?'white':'#555'};transition:all 0.15s">${lbl}</button>`;
  }).join('');
  if(_finModo==='dolar'){
    if(finChart){finChart.destroy();finChart=null;}
    buildFinanciamientoDolar(panel,modoBtns);
    return;
  }
  buildFinanciamientoPesos(panel,modoBtns);
}

function buildFinanciamientoDolar(panel,modoBtnsHtml){
  const fmtUSD=n=>n!=null?n.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}):'\u2014';
  const today=new Date();
  const cultivos=[
    {key:'soj',label:'Soja',color:'#2e7d32',icon:'\ud83c\udf31',futs:SOJ_FUT},
    {key:'mai',label:'Ma\u00edz',color:'#e65100',icon:'\ud83c\udf3d',futs:MAI_FUT},
    {key:'tri',label:'Trigo',color:'#1565c0',icon:'\ud83c\udf3e',futs:TRI_FUT}
  ];
  const sections=cultivos.map(cv=>{
    const futs=cv.futs;
    if(!futs||!futs.length){
      return `<div class="fin-card" style="margin-bottom:18px">
        <div class="fin-section-title">${cv.icon} ${cv.label}</div>
        <div style="padding:20px;text-align:center;color:#aaa;font-size:0.85rem">Sin datos de futuros.</div>
      </div>`;
    }
    const dispUsd=_finGetVAUsd(cv.key);
    const validFuts=sortByVenc(futs.filter(r=>r.ajuste&&r.ajuste!=='N/A'&&!isNaN(parseFloat(r.ajuste)))).slice(0,3);
    const cards=validFuts.map(f=>{
      const vencDate=VENC_DATES[f.venc_display];
      const dias=vencDate?Math.round((vencDate-today)/(1000*60*60*24)):null;
      const futUsd=parseFloat(f.ajuste);
      const pasePct=(dispUsd&&futUsd&&dispUsd>0)?((futUsd/dispUsd-1)*100):null;
      const tnaPase=(pasePct!=null&&dias!=null&&dias>0)?(pasePct*365/dias):null;
      const conviene=(tnaPase!=null)?(tnaPase>_finTasaUsd):null;
      const cardClass=conviene===null?'fin-venc-card':conviene?'fin-venc-card conviene':'fin-venc-card no-conviene';
      const badge=conviene===null?'<span style="color:#aaa;font-size:0.82rem">Sin datos suficientes</span>':
        conviene?'<span class="fin-badge-conv">\ud83c\udfe6 Conviene retener y financiarse</span>':
                 '<span class="fin-badge-noconv">\ud83d\udce4 Conviene vender</span>';
      const fechaStr=vencDate?vencDate.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}):'\u2014';
      const diffTna=tnaPase!=null?(tnaPase-_finTasaUsd):null;
      return `<div class="${cardClass}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div style="font-size:1.15rem;font-weight:900;color:${cv.color}">${f.venc_display}</div>
          <div style="text-align:right"><div style="font-size:0.7rem;color:#aaa">Vto: ${fechaStr}</div><div style="font-size:0.7rem;color:#aaa">${dias!=null?dias+' d\u00edas':''}</div></div>
        </div>
        <div class="fin-section-title">\ud83d\udcb2 Pase Disponible \u2192 Futuro</div>
        <div class="fin-row"><span class="fin-label">Disponible USD</span><span class="fin-val">USD ${fmtUSD(dispUsd)}/tn</span></div>
        <div class="fin-row"><span class="fin-label">Futuro ${cv.label}</span><span class="fin-val">USD ${fmtUSD(futUsd)}/tn</span></div>
        <div class="fin-row"><span class="fin-label">Pase total</span><span class="fin-val">${pasePct!=null?(pasePct>=0?'+':'')+pasePct.toFixed(2)+'%':'\u2014'}</span></div>
        <div class="fin-total-row"><span style="font-size:0.8rem;font-weight:700;color:#555">TNA impl\u00edcita del pase</span><span style="font-size:1rem;font-weight:800;color:#1a1a2e">${tnaPase!=null?(tnaPase>=0?'+':'')+tnaPase.toFixed(1)+'%':'\u2014'}</span></div>
        <div class="fin-total-row" style="background:#eff6ff;"><span style="font-size:0.8rem;font-weight:700;color:#1e40af">Costo financiamiento USD</span><span style="font-size:1rem;font-weight:800;color:#1e40af">${_finTasaUsd.toFixed(1)}%</span></div>
        <div style="border-top:1px solid #f0f2f5;margin-top:4px;padding-top:10px">
          ${badge}
          ${diffTna!=null?`<div style="display:flex;justify-content:space-between;margin-top:4px">
            <span style="font-size:0.85rem;font-weight:800;color:${conviene?'#166534':'#991b1b'}">${diffTna>=0?'+':''}${diffTna.toFixed(1)}pp vs costo</span>
          </div>`:''}
        </div>
      </div>`;
    }).join('');
    return `<div style="margin-bottom:22px">
      <div style="font-size:0.85rem;font-weight:800;color:${cv.color};text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">${cv.icon} ${cv.label}</div>
      <div class="fin-venc-grid">${cards}</div>
    </div>`;
  }).join('');

  panel.innerHTML=`
    <div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap">${modoBtnsHtml}</div>
    <div class="fin-card" style="margin-bottom:18px">
      <div style="font-size:0.8rem;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:14px">\u2699\ufe0f Par\u00e1metros</div>
      <div style="display:flex;gap:28px;flex-wrap:wrap;align-items:flex-end">
        <div style="display:flex;flex-direction:column;gap:6px">
          <label style="font-size:0.7rem;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:0.4px">Tasa de financiamiento USD</label>
          <div style="display:flex;align-items:center;gap:6px">
            <input type="number" id="fin-tasa-usd" value="${_finTasaUsd}" min="0" max="100" step="0.5"
              style="padding:7px 12px;border:1.5px solid #dde;border-radius:8px;font-size:0.9rem;font-weight:700;color:#1a1a2e;width:85px;outline:none"
              onkeydown="if(event.key==='Enter'){_finSetTasaUsd(this.value);this.blur();}"
              onblur="_finSetTasaUsd(this.value)">
            <span style="color:#888;font-size:0.85rem">% TNA</span>
          </div>
        </div>
        <div style="font-size:0.72rem;color:#bbb;padding-bottom:8px;font-style:italic">TNA pase = ((Futuro/Disponible) \u2212 1) \u00d7 365/d\u00edas</div>
      </div>
    </div>
    ${sections}`;
}

function buildFinanciamientoPesos(panel,modoBtnsHtml){
  const cult=_finCultivo;
  const cultLabel=cult==='soj'?'Soja':cult==='mai'?'Maíz':'Trigo';
  const cultColor=cult==='soj'?'#2e7d32':cult==='mai'?'#e65100':'#1565c0';
  const futs=cult==='soj'?SOJ_FUT:cult==='mai'?MAI_FUT:TRI_FUT;
  if(!futs||!futs.length){panel.innerHTML='<div style="padding:48px;text-align:center;color:#aaa;font-size:0.9rem">Sin datos de futuros. Actualizá los datos primero.</div>';return;}
  const va=_finGetVA(cult);
  const isVAManual=!!_finVA[cult];
  const isVAFromAcopio=!isVAManual&&!!(window._customSpotArs&&window._customSpotArs[cult+'-fut']);
  const vaDisplay=va?va.toLocaleString('es-AR',{maximumFractionDigits:0}):'';
  const tna=_finTNA/100;
  const today=new Date();
  const fmtARS=n=>n!=null?n.toLocaleString('es-AR',{minimumFractionDigits:0,maximumFractionDigits:0}):'—';
  const fmtUSD=n=>n!=null?n.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}):'—';
  // 3 próximos vencimientos válidos
  const validFuts=sortByVenc(futs.filter(r=>r.ajuste&&r.ajuste!=='N/A'&&!isNaN(parseFloat(r.ajuste)))).slice(0,3);
  const cards=validFuts.map(f=>{
    const vencDate=VENC_DATES[f.venc_display];
    const dias=vencDate?Math.round((vencDate-today)/(1000*60*60*24)):null;
    const vtoAnios=dias!=null?dias/365:null;
    const vn=(va!=null&&dias!=null)?va*(1+tna*dias/365):null;
    const dlrFut=_finFindDollarFut(f.venc_display);
    const futPriceUsd=parseFloat(f.ajuste);
    const dlrPrice=dlrFut?parseFloat(dlrFut.ajuste):null;
    const resultado=(futPriceUsd&&dlrPrice)?futPriceUsd*dlrPrice:null;
    const conviene=(resultado!=null&&vn!=null)?(resultado>=vn):null;
    const diferencia=(resultado!=null&&vn!=null)?resultado-vn:null;
    const ratio=(resultado!=null&&vn!=null)?(resultado/vn*100):null;
    const cardClass=conviene===null?'fin-venc-card':conviene?'fin-venc-card conviene':'fin-venc-card no-conviene';
    const badge=conviene===null?'<span style="color:#aaa;font-size:0.82rem">Sin datos suficientes</span>':
      conviene?'<span class="fin-badge-conv">🏦 Conviene retener y financiarse</span>':

let newsCurrentFilter = 'todos';

function newsSetFilter(crop) {
  newsCurrentFilter = crop;
  ['todos','trigo','maiz','soja'].forEach(function(c) {
    var el = document.getElementById('nchip-' + c);
    if (el) el.classList.toggle('active', c === crop);
  });
  newsRender();
}

function newsRender() {
  var container = document.getElementById('news-container');
  if (!container) return;
  var countEl = document.getElementById('news-filter-count');
  var cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 7);

  var items = NEWS_DATA.filter(function(n) {
    var d = new Date(n.fecha);
    if (d < cutoff) return false;
    if (newsCurrentFilter === 'todos') return true;
    return n.cultivo.toLowerCase().indexOf(newsCurrentFilter) >= 0;
  });

  if (countEl) countEl.textContent = items.length + ' nota' + (items.length !== 1 ? 's' : '');

  if (items.length === 0) {
    container.innerHTML = '<div class="news-empty"><div class="icon">🌿</div><p>No hay noticias para el filtro seleccionado.</p></div>';
    return;
  }

  var html = '<div class="news-list">';
  var lastDate = '';

  items.forEach(function(n) {
    var colorClass = n.cultivo.indexOf('/') >= 0 ? 'c-multi'
      : n.cultivo.toLowerCase().indexOf('trigo') >= 0 ? 'c-trigo'
      : (n.cultivo.toLowerCase().indexOf('maíz') >= 0 || n.cultivo.toLowerCase().indexOf('maiz') >= 0) ? 'c-maiz'
      : n.cultivo.toLowerCase().indexOf('soja') >= 0 ? 'c-soja' : '';

    var tagClass = n.cultivo.indexOf('/') >= 0 ? 'ntag-multi'
      : n.cultivo.toLowerCase().indexOf('trigo') >= 0 ? 'ntag-trigo'
      : (n.cultivo.toLowerCase().indexOf('maíz') >= 0 || n.cultivo.toLowerCase().indexOf('maiz') >= 0) ? 'ntag-maiz'
      : n.cultivo.toLowerCase().indexOf('soja') >= 0 ? 'ntag-soja' : 'ntag-gen';

    var daysAgo = Math.floor((new Date() - new Date(n.fecha)) / 86400000);
    var age = daysAgo === 0 ? 'Hoy' : daysAgo === 1 ? 'Ayer' : 'Hace ' + daysAgo + ' días';
    var isFresh = daysAgo <= 1;

    if (n.fecha !== lastDate) {
      var label = daysAgo === 0 ? 'Hoy' : daysAgo === 1 ? 'Ayer'
        : new Date(n.fecha + 'T00:00:00').toLocaleDateString('es-AR', {weekday:'long', day:'numeric', month:'long'});
      html += '<div class="date-divider">' + label + '</div>';
      lastDate = n.fecha;
    }

    var resumen = n.resumen.length > 220 ? n.resumen.slice(0, 220).replace(/\s\S+$/, '') + '…' : n.resumen;

    html += '<div class="news-card ' + colorClass + '">'
      + '<div class="card-meta">'
      + '<span style="font-size:0.72rem;color:#999">' + n.fecha + '</span>'
      + '<span class="card-fuente">' + n.fuente + '</span>'
      + '<span class="card-cultivo ' + tagClass + '">' + n.cultivo + '</span>'
      + '<span class="age-badge' + (isFresh ? ' fresh' : '') + '">' + age + '</span>'
      + '</div>'
      + '<div class="card-titulo">' + n.titulo + '</div>'
      + '<div class="card-resumen">' + resumen + '</div>'
      + '<div class="card-footer"><a class="btn-ver-nota" href="' + n.link + '" target="_blank" rel="noopener">Ver nota →</a></div>'
      + '</div>';
  });

  html += '</div>';
  container.innerHTML = html;
}
