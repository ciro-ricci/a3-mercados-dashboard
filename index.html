function parseDollarRatesCSV(text){const fl=text.trim().split("\n")[0]||"";if(fl.includes("|"))return null;
  const pRow=row=>{const c=[];let cur='',q=false;for(const ch of row+','){if(ch==='"')q=!q;else if(ch===','&&!q){c.push(cur.trim());cur='';}else cur+=ch;}return c;};
  const lines=text.trim().split(/\r?\n/);if(lines.length<2)return null;
  const hdrs=pRow(lines[0]).map(h=>h.toLowerCase().replace(/['"]/g,'').trim());
  const iTipo=hdrs.findIndex(h=>h.includes('tipo'));
  const iCompra=hdrs.findIndex(h=>h.includes('compra'));
  const iVenta=hdrs.findIndex(h=>h.includes('venta'));
  if(iTipo<0||iVenta<0)return null;
  const pN=s=>{if(!s)return null;s=String(s).replace(/[$\s"]/g,'').trim();const n=parseFloat(s.replace(',','.'));return isNaN(n)?null:n;};
  const res=[];
  for(let i=1;i<lines.length;i++){
    const p=pRow(lines[i]);if(!p[iTipo])continue;
    const tipo=p[iTipo].replace(/['"]/g,'').trim();if(!tipo)continue;
    res.push({tipo,compra:pN(p[iCompra]),venta:pN(p[iVenta])});
  }
  return res.length?res:null;
}
function parseDollarRatesMd(text){
  const res=[];
  for(const line of text.split('\n')){
    const l=line.trim();
    if(!l.startsWith('|'))continue;
    if(/^[|:\s\-]+$/.test(l))continue;
    const cells=l.replace(/^\||\|$/g,'').split('|').map(s=>s.replace(/\\/g,'').trim());
    if(cells.length<3)continue;
    const tipo=cells[0];if(!tipo||/tipo/i.test(tipo))continue;
    const pN=s=>{const n=parseFloat((s||'').replace(',','.'));return isNaN(n)?null:n;};
    res.push({tipo,compra:pN(cells[1]),venta:pN(cells[2])});
  }
  return res.length?res:null;
}

function buildChain(panelId,opts,vencs){
  const panel=document.getElementById('panel-'+panelId);
  const futs=panelId==='soj-opts'?SOJ_FUT:panelId==='mai-opts'?MAI_FUT:TRI_FUT;
  function getFutPrice(venc){if(!futs||!futs.length)return null;const r=futs.find(f=>f.venc_display===venc&&f.ajuste&&f.ajuste!=='N/A'&&!isNaN(parseFloat(f.ajuste)));return r?parseFloat(r.ajuste):null;}
  function render(){
    const sections=vencs.map(venc=>{
      const futPrice=getFutPrice(venc);
      const filtered=opts.filter(r=>r.venc_serie===venc);
      if(!filtered.length)return '';
      const callMap={},putMap={};
      filtered.forEach(r=>{if(r.tipo_op==='C')callMap[r.strike]=r;else putMap[r.strike]=r;});
      let strikes=[...new Set(filtered.map(r=>r.strike))].sort((a,b)=>a-b);
      if(!strikes.length)return '';

      // Filtrar strikes con actividad (IA o volumen > 0 en call o put)
      const toN=v=>v&&v!=='N/A'?parseInt(v)||0:0;
      const activeStrikes=strikes.filter(s=>{const c=callMap[s]||{},p=putMap[s]||{};return toN(c.interes_abierto)>0||toN(c.volumen)>0||toN(p.interes_abierto)>0||toN(p.volumen)>0;});

const LECAP_MONTH = {E:1,F:2,M:3,A:4,Y:5,J:6,L:7,G:8,S:9,O:10,N:11,D:12};
const LECAP_MES   = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

// Precio final por cada 100 VN al vencimiento (estático, provisto por analista)
const PRECIO_FINAL = {
  'S15Y6': 105.18,
  'S29Y6': 132.04,
  'S17L6': 107.92,
  'S31L6': 117.68,
  'S14G6': 108.03,
  'S31G6': 127.06,
  'S30O6': 135.28,
  'S30N6': 129.89,
  'S30S6': 117.536,
};

function decodeLecap(ticker){
  const tipo=ticker[0]==='S'?'LECAP':ticker[0]==='X'?'BONCAP':'Letra';
  const day=parseInt(ticker.substring(1,3));
  const mc=ticker[3];
  const yr=parseInt(ticker[4]);
  const m=LECAP_MONTH[mc];
  if(!m||isNaN(day)||isNaN(yr))return null;
  const year=2020+yr;
  const venc=new Date(year,m-1,day);
  const today=new Date();today.setHours(0,0,0,0);
  const dias=Math.round((venc-today)/(86400000));
  const display=`${day} ${LECAP_MES[m]} ${year}`;
  return{tipo,venc,dias,display,month:m,year};
}

function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);
  if(!lines.length)return{headers:[],rows:[]};
  const parse=line=>{const cols=[];let cur='',inQ=false;for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}else if(c===','&&!inQ){cols.push(cur.trim());cur='';}else cur+=c;}cols.push(cur.trim());return cols;};
  const headers=parse(lines[0]).map(h=>h.replace(/^"|"$/g,'').trim());
  return{headers,rows:lines.slice(1).map(l=>parse(l)).filter(r=>r.length>=headers.length&&r.some(c=>c))};
}

function findCol(headers,...candidates){
  for(const c of candidates){
    const i=headers.findIndex(h=>h.toLowerCase().includes(c.toLowerCase()));
    if(i>=0)return i;
  }
  return -1;
}

// Parsea la hoja LECAP: tabla de 2 columnas (TICKER | PRECIO).
function parseMdLecaps(text){
  const lines=text.split('\n');
  const TICKER_RE=/^[A-Z][A-Z0-9]{4}$/;
  const seen=new Map();
  for(const line of lines){
    const l=line.trim();
    if(!l.startsWith('|'))continue;
    if(/^[|:\s\-]+$/.test(l))continue;
    const cells=l.replace(/^\||\|$/g,'').split('|').map(c=>c.replace(/\\/g,'').trim());
    if(cells.length!==2)continue;
    const ticker=cells[0].toUpperCase();
    const rawPrice=cells[1];
    if(!TICKER_RE.test(ticker))continue;
    if(rawPrice==='#N/A'||rawPrice==='N/A'||rawPrice==='')continue;
    const price=parseFloat(rawPrice.replace(/,/g,'.'));
    if(isNaN(price)||price<=0)continue;
    if(!seen.has(ticker))seen.set(ticker,String(price));
  }
  if(seen.size===0)return null;
  const rows=[...seen.entries()].map(([t,p])=>[t,p,'0']);
  return{headers:['ticker','precio','var'],rows};
}

function extractText(res){
  if(!res)return null;
  if(typeof res==='string')return res;
  if(Array.isArray(res)){
    return res.filter(b=>b.type==='text'||typeof b.text==='string').map(b=>b.text||b).join('');
  }
  if(res.content){
    if(typeof res.content==='string')return res.content;
    if(Array.isArray(res.content))return res.content.filter(b=>b.type==='text'||typeof b.text==='string').map(b=>b.text||b).join('');
  }
  if(res.text)return res.text;
  if(res.body)return res.body;
  return JSON.stringify(res);
}

let lecapSort='tna';

function calcYields(pa,pf,dias){
  if(!pf||!pa||dias<=0)return{rend:null,tna:null,tem:null,tea:null};
  const ratio=pf/pa;
  const rend=(ratio-1)*100;
  const tna=(ratio-1)*(365/dias)*100;
  const tem=(Math.pow(ratio,30/dias)-1)*100;
  const tea=(Math.pow(ratio,365/dias)-1)*100;
  return{rend,tna,tem,tea};
}

function tnaColor(tna){
  if(tna===null)return'#888';
  if(tna>=50)return'#1e7e34';
  if(tna>=35)return'#2e7d32';
  if(tna>=25)return'#b45309';
  return'#cb2431';
}
function tnaBg(tna){
  if(tna===null)return'#f0f2f5';
  if(tna>=50)return'#e6f4ea';
  if(tna>=35)return'#f0faf0';
  if(tna>=25)return'#fef3c7';
  return'#fce8e8';
}

// ── Financiamiento ────────────────────────────────────────────────────
let _finCultivo='soj';
let _finTNA=32;
let _finVA={soj:null,mai:null,tri:null};
let _finModo='pesos';
let _finTasaUsd=7;

function _finSetCultivo(c){_finCultivo=c;buildFinanciamientoPanel();}
function _finSetTNA(v){const n=parseFloat(String(v).replace(',','.'));if(!isNaN(n)&&n>0){_finTNA=n;buildFinanciamientoPanel();}}
function _finSetVA(c,v){
  const raw=String(v||'').replace(/\s/g,'').replace(/\./g,'').replace(',','.');
  const n=parseFloat(raw);
  _finVA[c]=(!v||v===''||isNaN(n)||n<=0)?null:n;
  buildFinanciamientoPanel();
}
function _finSetModo(m){_finModo=m;buildFinanciamientoPanel();}
function _finSetTasaUsd(v){const n=parseFloat(String(v).replace(',','.'));if(!isNaN(n)&&n>=0){_finTasaUsd=n;buildFinanciamientoPanel();}}
function _finGetVA(cult){
  if(_finVA[cult])return _finVA[cult];
  const panelId=cult+'-fut';
  const customArs=window._customSpotArs&&window._customSpotArs[panelId];
  if(customArs)return customArs;
  const cultKey=cult==='soj'?'soja':cult==='mai'?'maiz':'trigo';
  return SPOT?SPOT[cultKey+'_ars']:null;
}
function _finGetVAUsd(cult){
  const cultKey=cult==='soj'?'soja':cult==='mai'?'maiz':'trigo';
  const panelId=cult+'-fut';
  const customArs=window._customSpotArs&&window._customSpotArs[panelId];
  if(customArs&&SPOT&&SPOT.tc)return customArs/SPOT.tc;
  if(!SPOT)return null;
  return (SPOT.tc&&SPOT[cultKey+'_ars'])?SPOT[cultKey+'_ars']/SPOT.tc:SPOT[cultKey+'_usd'];
}
function _finFindDollarFut(vencDisplay){
  // Match exacto por mes/año: JUL26 → 07/2026, SEP26 → 09/2026, etc.
  if(!DLR_FUT||!DLR_FUT.length)return null;
  const mmap={ENE:'01',FEB:'02',MAR:'03',ABR:'04',MAY:'05',JUN:'06',JUL:'07',AGO:'08',SEP:'09',OCT:'10',NOV:'11',DIC:'12'};
  const m=vencDisplay.match(/^([A-Z]{3})(\d{2})$/);
  if(!m)return null;
  const mon=mmap[m[1]];const yr='20'+m[2];
  if(!mon)return null;
  const target=mon+'/'+yr; // ej: "07/2026"
  return DLR_FUT.find(r=>r.venc_display===target&&r.ajuste&&r.ajuste!=='N/A'&&!isNaN(parseFloat(r.ajuste)))||null;
}
function buildFinanciamientoPanel(){
  const panel=document.getElementById('panel-financiamiento');if(!panel)return;
  const modoBtns=['pesos','dolar'].map(m=>{
    const lbl=m==='pesos'?'\ud83d\udcb5 Pesos':'\ud83d\udcb2 D\u00f3lar';
    const act=m===_finModo;
    return `<button onclick="_finSetModo('${m}')" style="padding:8px 22px;border:2px solid ${act?'#16213e':'#dde'};border-radius:8px;font-size:0.85rem;font-weight:700;cursor:pointer;background:${act?'#16213e':'white'};color:${act?'white':'#555'};transition:all 0.15s">${lbl}</button>`;
  }).join('');
  if(_finModo==='dolar'){
    if(finChart){finChart.destroy();finChart=null;}
    buildFinanciamientoDolar(panel,modoBtns);
    return;
  }
  buildFinanciamientoPesos(panel,modoBtns);
}

function buildFinanciamientoDolar(panel,modoBtnsHtml){
  const fmtUSD=n=>n!=null?n.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}):'\u2014';
  const today=new Date();
  const cultivos=[
    {key:'soj',label:'Soja',color:'#2e7d32',icon:'\ud83c\udf31',futs:SOJ_FUT},
    {key:'mai',label:'Ma\u00edz',color:'#e65100',icon:'\ud83c\udf3d',futs:MAI_FUT},
    {key:'tri',label:'Trigo',color:'#1565c0',icon:'\ud83c\udf3e',futs:TRI_FUT}
  ];
  const sections=cultivos.map(cv=>{
    const futs=cv.futs;
    if(!futs||!futs.length){
      return `<div class="fin-card" style="margin-bottom:18px">
        <div class="fin-section-title">${cv.icon} ${cv.label}</div>
        <div style="padding:20px;text-align:center;color:#aaa;font-size:0.85rem">Sin datos de futuros.</div>
      </div>`;
    }
    const dispUsd=_finGetVAUsd(cv.key);
    const validFuts=sortByVenc(futs.filter(r=>r.ajuste&&r.ajuste!=='N/A'&&!isNaN(parseFloat(r.ajuste)))).slice(0,3);
    const cards=validFuts.map(f=>{
      const vencDate=VENC_DATES[f.venc_display];
      const dias=vencDate?Math.round((vencDate-today)/(1000*60*60*24)):null;
      const futUsd=parseFloat(f.ajuste);
      const pasePct=(dispUsd&&futUsd&&dispUsd>0)?((futUsd/dispUsd-1)*100):null;
      const tnaPase=(pasePct!=null&&dias!=null&&dias>0)?(pasePct*365/dias):null;
      const conviene=(tnaPase!=null)?(tnaPase>_finTasaUsd):null;
      const cardClass=conviene===null?'fin-venc-card':conviene?'fin-venc-card conviene':'fin-venc-card no-conviene';
      const badge=conviene===null?'<span style="color:#aaa;font-size:0.82rem">Sin datos suficientes</span>':
        conviene?'<span class="fin-badge-conv">\ud83c\udfe6 Conviene retener y financiarse</span>':
                 '<span class="fin-badge-noconv">\ud83d\udce4 Conviene vender</span>';
      const fechaStr=vencDate?vencDate.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}):'\u2014';
      const diffTna=tnaPase!=null?(tnaPase-_finTasaUsd):null;
      return `<div class="${cardClass}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div style="font-size:1.15rem;font-weight:900;color:${cv.color}">${f.venc_display}</div>
          <div style="text-align:right"><div style="font-size:0.7rem;color:#aaa">Vto: ${fechaStr}</div><div style="font-size:0.7rem;color:#aaa">${dias!=null?dias+' d\u00edas':''}</div></div>
        </div>
        <div class="fin-section-title">\ud83d\udcb2 Pase Disponible \u2192 Futuro</div>
        <div class="fin-row"><span class="fin-label">Disponible USD</span><span class="fin-val">USD ${fmtUSD(dispUsd)}/tn</span></div>
        <div class="fin-row"><span class="fin-label">Futuro ${cv.label}</span><span class="fin-val">USD ${fmtUSD(futUsd)}/tn</span></div>
        <div class="fin-row"><span class="fin-label">Pase total</span><span class="fin-val">${pasePct!=null?(pasePct>=0?'+':'')+pasePct.toFixed(2)+'%':'\u2014'}</span></div>
        <div class="fin-total-row"><span style="font-size:0.8rem;font-weight:700;color:#555">TNA impl\u00edcita del pase</span><span style="font-size:1rem;font-weight:800;color:#1a1a2e">${tnaPase!=null?(tnaPase>=0?'+':'')+tnaPase.toFixed(1)+'%':'\u2014'}</span></div>
        <div class="fin-total-row" style="background:#eff6ff;"><span style="font-size:0.8rem;font-weight:700;color:#1e40af">Costo financiamiento USD</span><span style="font-size:1rem;font-weight:800;color:#1e40af">${_finTasaUsd.toFixed(1)}%</span></div>
        <div style="border-top:1px solid #f0f2f5;margin-top:4px;padding-top:10px">
          ${badge}
          ${diffTna!=null?`<div style="display:flex;justify-content:space-between;margin-top:4px">
            <span style="font-size:0.85rem;font-weight:800;color:${conviene?'#166534':'#991b1b'}">${diffTna>=0?'+':''}${diffTna.toFixed(1)}pp vs costo</span>
          </div>`:''}
        </div>
      </div>`;
    }).join('');
    return `<div style="margin-bottom:22px">
      <div style="font-size:0.85rem;font-weight:800;color:${cv.color};text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">${cv.icon} ${cv.label}</div>
      <div class="fin-venc-grid">${cards}</div>
    </div>`;
  }).join('');

  panel.innerHTML=`
    <div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap">${modoBtnsHtml}</div>
    <div class="fin-card" style="margin-bottom:18px">
      <div style="font-size:0.8rem;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:14px">\u2699\ufe0f Par\u00e1metros</div>
      <div style="display:flex;gap:28px;flex-wrap:wrap;align-items:flex-end">
        <div style="display:flex;flex-direction:column;gap:6px">
          <label style="font-size:0.7rem;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:0.4px">Tasa de financiamiento USD</label>
          <div style="display:flex;align-items:center;gap:6px">
            <input type="number" id="fin-tasa-usd" value="${_finTasaUsd}" min="0" max="100" step="0.5"
              style="padding:7px 12px;border:1.5px solid #dde;border-radius:8px;font-size:0.9rem;font-weight:700;color:#1a1a2e;width:85px;outline:none"
              onkeydown="if(event.key==='Enter'){_finSetTasaUsd(this.value);this.blur();}"
              onblur="_finSetTasaUsd(this.value)">
            <span style="color:#888;font-size:0.85rem">% TNA</span>
          </div>
        </div>
        <div style="font-size:0.72rem;color:#bbb;padding-bottom:8px;font-style:italic">TNA pase = ((Futuro/Disponible) \u2212 1) \u00d7 365/d\u00edas</div>
      </div>
    </div>
    ${sections}`;
}

function buildFinanciamientoPesos(panel,modoBtnsHtml){
  const cult=_finCultivo;
  const cultLabel=cult==='soj'?'Soja':cult==='mai'?'Maíz':'Trigo';
  const cultColor=cult==='soj'?'#2e7d32':cult==='mai'?'#e65100':'#1565c0';
  const futs=cult==='soj'?SOJ_FUT:cult==='mai'?MAI_FUT:TRI_FUT;
  if(!futs||!futs.length){panel.innerHTML='<div style="padding:48px;text-align:center;color:#aaa;font-size:0.9rem">Sin datos de futuros. Actualizá los datos primero.</div>';return;}
  const va=_finGetVA(cult);
  const isVAManual=!!_finVA[cult];
  const isVAFromAcopio=!isVAManual&&!!(window._customSpotArs&&window._customSpotArs[cult+'-fut']);
  const vaDisplay=va?va.toLocaleString('es-AR',{maximumFractionDigits:0}):'';
  const tna=_finTNA/100;
  const today=new Date();
  const fmtARS=n=>n!=null?n.toLocaleString('es-AR',{minimumFractionDigits:0,maximumFractionDigits:0}):'—';
  const fmtUSD=n=>n!=null?n.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}):'—';
  // 3 próximos vencimientos válidos
  const validFuts=sortByVenc(futs.filter(r=>r.ajuste&&r.ajuste!=='N/A'&&!isNaN(parseFloat(r.ajuste)))).slice(0,3);
  const cards=validFuts.map(f=>{
    const vencDate=VENC_DATES[f.venc_display];
    const dias=vencDate?Math.round((vencDate-today)/(1000*60*60*24)):null;
    const vtoAnios=dias!=null?dias/365:null;
    const vn=(va!=null&&dias!=null)?va*(1+tna*dias/365):null;
    const dlrFut=_finFindDollarFut(f.venc_display);
    const futPriceUsd=parseFloat(f.ajuste);
    const dlrPrice=dlrFut?parseFloat(dlrFut.ajuste):null;
    const resultado=(futPriceUsd&&dlrPrice)?futPriceUsd*dlrPrice:null;
    const conviene=(resultado!=null&&vn!=null)?(resultado>=vn):null;
    const diferencia=(resultado!=null&&vn!=null)?resultado-vn:null;
    const ratio=(resultado!=null&&vn!=null)?(resultado/vn*100):null;
    const cardClass=conviene===null?'fin-venc-card':conviene?'fin-venc-card conviene':'fin-venc-card no-conviene';
    const badge=conviene===null?'<span style="color:#aaa;font-size:0.82rem">Sin datos suficientes</span>':
      conviene?'<span class="fin-badge-conv">🏦 Conviene retener y financiarse</span>':
               '<span class="fin-badge-noconv">📤 Conviene vender</span>';
    const difHtml=diferencia!=null?`<div style="display:flex;justify-content:space-between;margin-top:4px">
      <span style="font-size:0.85rem;font-weight:800;color:${conviene?'#166534':'#991b1b'}">${diferencia>=0?'+':''}$${fmtARS(diferencia)}/tn</span>
      <span style="font-size:0.82rem;font-weight:700;color:${conviene?'#166534':'#991b1b'}">${ratio?(ratio-100>=0?'+':'')+(ratio-100).toFixed(1)+'%':''}</span>
    </div>`:'';
    const fechaStr=vencDate?vencDate.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}):'—';
    return `<div class="${cardClass}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div style="font-size:1.15rem;font-weight:900;color:${cultColor}">${f.venc_display}</div>
        <div style="text-align:right"><div style="font-size:0.7rem;color:#aaa">Vto: ${fechaStr}</div><div style="font-size:0.7rem;color:#aaa">${dias!=null?dias+' días':''}</div></div>
      </div>
      <div class="fin-section-title">📄 Costo de financiamiento</div>
      <div class="fin-row"><span class="fin-label">Precio disponible (VA)</span><span class="fin-val">${va?'$'+fmtARS(va):'—'}</span></div>
      <div class="fin-row"><span class="fin-label">TNA · días · años</span><span class="fin-val">${_finTNA}% · ${dias!=null?dias:'—'}d · ${vtoAnios!=null?vtoAnios.toFixed(3):'—'}</span></div>
      <div class="fin-total-row"><span style="font-size:0.8rem;font-weight:700;color:#555">VN del cheque</span><span style="font-size:1rem;font-weight:800;color:#1a1a2e">${vn?'$'+fmtARS(vn):'—'}</span></div>
      <div class="fin-section-title" style="margin-top:6px">📈 Futuro ${cultLabel} × Futuro Dólar</div>
      <div class="fin-row"><span class="fin-label">Futuro ${cultLabel}</span><span class="fin-val">USD ${fmtUSD(futPriceUsd)}/tn</span></div>
      <div class="fin-row"><span class="fin-label">Futuro Dólar ${dlrFut?'('+dlrFut.venc_display+')':''}</span><span class="fin-val">${dlrPrice?'$'+fmtARS(dlrPrice)+'/USD':'—'}</span></div>
      <div class="fin-total-row" style="background:#eff6ff;"><span style="font-size:0.8rem;font-weight:700;color:#1e40af">Resultado futuros</span><span style="font-size:1rem;font-weight:800;color:#1e40af">${resultado?'$'+fmtARS(resultado):'—'}</span></div>
      <div style="border-top:1px solid #f0f2f5;margin-top:4px;padding-top:10px">
        ${badge}${difHtml}
      </div>
    </div>`;
  });
  const cultBtns=['soj','mai','tri'].map(c=>{
    const lbl=c==='soj'?'🌱 Soja':c==='mai'?'🌽 Maíz':'🌾 Trigo';
    const act=c===cult;
    const cc=c==='soj'?'#2e7d32':c==='mai'?'#e65100':'#1565c0';
    return `<button onclick="_finSetCultivo('${c}')" style="padding:8px 22px;border:2px solid ${act?cc:'#dde'};border-radius:8px;font-size:0.85rem;font-weight:700;cursor:pointer;background:${act?cc:'white'};color:${act?'white':'#555'};transition:all 0.15s">${lbl}</button>`;
  }).join('');
  const vaBadge=isVAManual?'<span style="font-size:0.65rem;background:#f59e0b;color:#1a1a2e;padding:1px 7px;border-radius:3px;font-weight:800;margin-left:6px">MANUAL</span>':
    isVAFromAcopio?'<span style="font-size:0.65rem;background:#6366f1;color:white;padding:1px 7px;border-radius:3px;font-weight:700;margin-left:6px">desde acopio</span>':
    '<span style="font-size:0.65rem;color:#aaa;margin-left:5px">mercado</span>';
  const vaClearBtn=isVAManual?`<button onclick="_finVA['${cult}']=null;buildFinanciamientoPanel()" style="background:none;border:none;color:#f59e0b;cursor:pointer;font-size:0.78rem;font-weight:700;padding:0 4px">✕ auto</button>`:'';
  panel.innerHTML=`
    <div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap">${modoBtnsHtml}</div>
    <div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap">${cultBtns}</div>
    <div class="fin-card" style="margin-bottom:4px">
      <div style="font-size:0.8rem;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:14px">⚙️ Parámetros</div>
      <div style="display:flex;gap:28px;flex-wrap:wrap;align-items:flex-end">
        <div style="display:flex;flex-direction:column;gap:6px">
          <label style="font-size:0.7rem;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:0.4px">VA – Precio disponible ARS/tn ${vaBadge}</label>
          <div style="display:flex;align-items:center;gap:6px">
            <span style="color:#888;font-size:0.9rem">$</span>
            <input type="text" id="fin-va-${cult}" value="${vaDisplay}" placeholder="ej: 465.000"
              style="padding:7px 12px;border:1.5px solid ${isVAManual?'#f59e0b':'#dde'};border-radius:8px;font-size:0.9rem;font-weight:700;color:#1a1a2e;width:155px;outline:none;background:${isVAManual?'#fffbeb':'white'}"
              onkeydown="if(event.key==='Enter'){_finSetVA('${cult}',this.value);this.blur();}"
              onblur="_finSetVA('${cult}',this.value)">
            ${vaClearBtn}
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px">
          <label style="font-size:0.7rem;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:0.4px">Tasa TNA</label>
          <div style="display:flex;align-items:center;gap:6px">
            <input type="number" id="fin-tna" value="${_finTNA}" min="1" max="300" step="0.5"
              style="padding:7px 12px;border:1.5px solid #dde;border-radius:8px;font-size:0.9rem;font-weight:700;color:#1a1a2e;width:85px;outline:none"
              onkeydown="if(event.key==='Enter'){_finSetTNA(this.value);this.blur();}"
              onblur="_finSetTNA(this.value)">
            <span style="color:#888;font-size:0.85rem">% TNA</span>
          </div>
        </div>
        <div style="font-size:0.72rem;color:#bbb;padding-bottom:8px;font-style:italic">VN = VA × (1 + TNA × días/365)</div>
      </div>
    </div>
    <div class="fin-venc-grid">${cards.join('')}</div>
    <div class="fin-card" style="margin-top:18px">
      <div class="fin-section-title" style="margin-bottom:10px">📊 Comparativo por mes: VN del cheque vs. Resultado futuros</div>
      <div class="canvas-wrap" style="height:280px"><canvas id="fin-comparison-chart"></canvas></div>
    </div>`;

  setTimeout(()=>{
    if(finChart){finChart.destroy();finChart=null;}
    const ctx=document.getElementById('fin-comparison-chart');
    if(!ctx||!validFuts.length)return;
    const labels=validFuts.map(f=>f.venc_display);
    const vnData=validFuts.map(f=>{
      const vencDate=VENC_DATES[f.venc_display];
      const dias=vencDate?Math.round((vencDate-today)/(1000*60*60*24)):null;
      return (va!=null&&dias!=null)?va*(1+tna*dias/365):null;
    });
    const resData=validFuts.map(f=>{
      const dlrFut=_finFindDollarFut(f.venc_display);
      const futPriceUsd=parseFloat(f.ajuste);
      const dlrPrice=dlrFut?parseFloat(dlrFut.ajuste):null;
      return (futPriceUsd&&dlrPrice)?futPriceUsd*dlrPrice:null;
    });
    finChart=new Chart(ctx,{
      type:'bar',
      data:{
        labels:labels,
        datasets:[
          {label:'VN del cheque',data:vnData,backgroundColor:'#1a1a2e99',borderRadius:4},
          {label:'Resultado futuros',data:resData,backgroundColor:'#1e40af99',borderRadius:4}
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{display:true,position:'top',labels:{font:{size:11}}},
          tooltip:{callbacks:{
            label:item=>`${item.dataset.label}: ${item.raw?item.raw.toLocaleString('es-AR',{maximumFractionDigits:0}):'—'}`
          }}
        },
        scales:{
          x:{grid:{display:false},ticks:{font:{size:11,weight:'700'}}},
          y:{min:(cult==='soj'?200000:100000),title:{display:true,text:'ARS/tn',font:{size:11}},grid:{color:'#f0f2f5'},ticks:{font:{size:11},callback:v=>v.toLocaleString('es-AR',{maximumFractionDigits:0})}}
        }
      }
    });
  },50);
}

function showSplash(){
  const el=document.createElement('div');
  el.id='splash-overlay';
  el.innerHTML=`<div class="splash-inner">
    <div class="splash-logo"><img src="logo-data-miazzo.png" alt="Data Miazzo"></div>
    <div class="splash-title">Estrategias al grano</div>
    <div class="splash-sub">¿Desde qué dispositivo estás ingresando?</div>
    <div class="splash-options">
      <div class="splash-btn" onclick="chooseDevice('mobile')">
        <div class="sb-icon">📱</div>
        <div class="sb-label">Celular</div>
        <div class="sb-desc"></div>
      </div>
      <div class="splash-btn" onclick="chooseDevice('desktop')">
        <div class="sb-icon">💻</div>
        <div class="sb-label">Computadora</div>
        <div class="sb-desc"></div>
      </div>
    </div>
    <div class="splash-note">Tu preferencia se recordará para la próxima vez · <span style="cursor:pointer;text-decoration:underline;color:rgba(0,0,0,0.4)" onclick="localStorage.removeItem('a3_device_mode')">olvidar preferencia</span></div>
  </div>`;
  document.body.appendChild(el);
}
window.chooseDevice=function(mode){
  localStorage.setItem('a3_device_mode',mode);
  window.a3DeviceMode=mode;
  document.getElementById('splash-overlay')?.remove();
  loadAndInitA3();
};
window._initDeviceFlow=function(){
  window.a3DeviceMode=localStorage.getItem('a3_device_mode');
  if(window.a3DeviceMode){loadAndInitA3();}else{showSplash();}
};

  {fecha:'2026-07-08',fuente:'Bank Magazine',cultivo:'Soja',titulo:'El rechazo del Parlamento Europeo a considerar la soja de alto riesgo se celebró en el agro argentino',resumen:'El Parlamento Europeo votó en contra de los cambios propuestos por la Comisión Europea al Reglamento Delegado UE 2019/807, que incorporaba a la soja entre las materias primas de alto riesgo por cambio indirecto del uso del suelo; la Comisión ahora deberá reescribir la propuesta siguiendo los lineamientos del Parlamento, en línea con la posición de la Cancillería y el sector agroindustrial argentino. La Bolsa de Comercio de Rosario celebró la decisión al evitar que se aplicaran criterios que podían restringir el acceso de derivados de soja, en particular biodiésel, al mercado europeo. Gustavo Idigoras, presidente de Ciara-CEC, adelantó que el 16 de julio una delegación argentina estará en Bruselas para discutir la nueva redacción del reglamento, mientras el canciller Pablo Quirno destacó el trabajo conjunto entre Cancillería, gobiernos provinciales -como Santa Fe- y el sector privado para sostener el acceso de la soja argentina a la UE.',link:'https://bankmagazine.com.ar/el-rechazo-del-parlamento-europeo/'},
  {fecha:'2026-07-08',fuente:'deCampoNoticias',cultivo:'Maíz',titulo:'La chicharrita del maíz retrocedió en gran parte del país, pero el norte mantiene una alta presión',resumen:'El último relevamiento de la Red Nacional de Monitoreo de Dalbulus maidis mostró un retroceso de las capturas en el centro y sur del país, mientras el NOA y el NEA mantienen niveles elevados: en el NOA, el 98% de 51 localidades registró presencia del insecto (83% en la categoría de mayor abundancia), con un promedio que bajó de 998,88 a 807,57 adultos por trampa pero picos de 4.500 en El Bordo (Salta) y 3.771 en Viñalito (Jujuy); en el NEA el 95% de 63 localidades detectó el vector, con un promedio prácticamente sin cambios (781,30 a 759,3 adultos por trampa). En el Litoral el promedio cayó de 132,20 a 88,75 adultos por trampa, en Centro Norte bajó a la mitad (de 753,53 a 363,73) y en Centro Sur el 54% de 97 localidades no registró capturas. Los especialistas remarcaron que el monitoreo debe continuar durante el otoño y el invierno, que las heladas serán determinantes para la supervivencia del insecto, y que la eliminación de maíces voluntarios («puente verde») junto con el Manejo Integrado de Plagas serán claves para contener la plaga de cara a la campaña 2026/27.',link:'https://www.decamponoticias.com/chicharrita-del-maiz-retroceso/'},
  {fecha:'2026-07-08',fuente:'Ruralnet',cultivo:'Soja',titulo:'COFCO confirmó la primera compra concreta de soja estadounidense por parte de China en la campaña',resumen:'La empresa estatal china COFCO adquirió al menos 300.000 toneladas de soja de origen estadounidense, la primera confirmación concreta de demanda china que el mercado esperaba desde hacía semanas, en un contexto de cambio de estrategia de los fondos especulativos y de señales de demanda débil que venían presionando al complejo granario. En Argentina, mientras tanto, la comercialización de la cosecha de soja avanza a un ritmo inusualmente lento, aunque se esperaría mayor actividad de venta durante la segunda mitad del año. El repliegue previo de los fondos especulativos, sumado a un dólar más fuerte, había mantenido a los granos bajo presión en las semanas anteriores, por lo que la confirmación de compras chinas devolvió parte del respaldo a los precios de referencia en Chicago.',link:'https://ruralnet.com.ar/mercado-granos-martes-8-julio-2026-china-cofco-soja-chicago/'},
  {fecha:'2026-07-07',fuente:'Ruralnet',cultivo:'Trigo / Maíz / Soja',titulo:'El clima vuelve a dominar el mercado de granos: el maíz recibe señales alcistas y la soja sigue esperando a China',resumen:'Un informe trimestral de stocks del USDA ubicó las existencias de maíz en EEUU 2,9 millones de toneladas por debajo de lo esperado, mientras Francia atraviesa la peor ola de calor para el cultivo en 26 años (producción estimada en 9,5 Mt) y Ucrania sufre estrés térmico en la floración, según el analista Dante Romano (Universidad Austral). En trigo la oferta mundial sigue abundante, con Rusia elevando su estimación a 91,2 Mt, mientras en Argentina la comercialización de soja sigue rezagada: solo 25% de la producción vendida contra un promedio histórico de 29%.',link:'https://ruralnet.com.ar/mercado-granos-prima-climatica-maiz-alcista-julio-2026/'},
  {fecha:'2026-07-06',fuente:'Bichos de Campo',cultivo:'Maíz',titulo:'Locura en el mercado argentino de maíz: se registraron embarques por 1,83 millones de toneladas en una sola jornada',resumen:'Se anotaron 1,83 Mt de Declaraciones Juradas de Ventas Externas (DJVE) de maíz 2025/26 para embarcar entre julio y octubre próximos, una cifra inédita, mientras ese mismo día también se registraron 600.457 toneladas de harina de soja, 207.000 de poroto y 112.212 de aceite de soja. El programa de embarques de maíz ya suma 2.729.023 toneladas para julio y 1.501.317 para agosto, por delante de la harina de soja con 1.448.950 y 1.025.000 toneladas respectivamente. Con un FOB oficial de 207 US$/t, el FAS teórico ronda los 177 US$/t, muy por debajo de lo que convalida la demanda exportadora, explicada por la incertidumbre en la región del Mar Negro, donde el USDA proyecta una oferta exportable de 27 Mt (23 Mt de Ucrania y 4 Mt de Rusia) ante el recrudecimiento del conflicto bélico entre Rusia y Ucrania, con ataques de drones y misiles que se intensificaron en las últimas semanas y que podrían comprometer la capacidad exportadora de productos agroindustriales de la región del Mar Negro.',link:'https://bichosdecampo.com/locura-en-el-mercado-argentino-de-maiz-se-registraron-en-una-sola-jornada-embarques-por-183-millones-de-toneladas/'},
  {fecha:'2026-07-06',fuente:'Bichos de Campo',cultivo:'Maíz / Soja / Trigo',titulo:'Llegó el mercado climático en EEUU y los precios del maíz y la soja suben por el pronóstico de lluvias escasas',resumen:'La NOAA no prevé lluvias importantes para la próxima semana en la mayor parte del Medio Oeste estadounidense, y el pronóstico extendido a dos semanas anticipa precipitaciones por debajo de lo normal en el oeste y centro de la región, lo que impulsó a fondos agrícolas del CME Group a tomar posiciones compradas en maíz y soja tras una fase bajista. La mayoría de las zonas productoras de EEUU mantiene buena condición hídrica, salvo sectores en los márgenes norte y sur del Medio Oeste, mientras el trigo de invierno sigue condicionado por el recorte de cosecha del USDA a 8,58 millones de hectáreas por sequía.',link:'https://bichosdecampo.com/llego-el-mercado-climatico-en-ee-uu-y-los-precios-del-maiz-y-la-soja-suben-fuerte-ante-el-pronostico-de-lluvias-escasas-a-nulas/'},
  {fecha:'2026-07-06',fuente:'LA NACION',cultivo:'Maíz / Soja',titulo:'Pronóstico de una ola de calor en el Medio Oeste de EEUU pone en alerta al mercado en la etapa crítica de maíz y soja',resumen:'Modelos climáticos como los de la NOAA anticipan un marcado ascenso de las temperaturas entre el sábado 11 y el miércoles 15 de julio en las planicies y el oeste del cinturón agrícola estadounidense, con probabilidades de precipitaciones inferiores a las habituales en el norte de Kansas y gran parte de Nebraska, justo al inicio de la etapa crítica de definición de rendimiento de maíz y soja, según el analista Eugenio Irazuegui (Zeni). El último informe del USDA ya había registrado una baja en la condición buena a excelente de la soja estadounidense, que rondaba los 65 puntos porcentuales, el percentil más alto de los últimos años y muy por encima del promedio histórico de 61 puntos. Jeremías Battistoni, analista de AZ-Group, describió un «cóctel de factores alcistas que tiene mucho que ver con el mercado climático americano que ingresa en el período de máxima volatilidad estacional», coincidiendo con rumores de un posible acuerdo comercial entre Estados Unidos y China que podría derivar en compras de soja de la nueva campaña por parte del gigante asiático.',link:'https://www.lanacion.com.ar/economia/campo/volo-la-soja-el-precio-internacional-subio-us1755-en-medio-de-un-coctel-de-importantes-factores-nid06072026/'},
  {fecha:'2026-07-04',fuente:'El Litoral',cultivo:'Trigo / Maíz / Soja',titulo:'El agro argentino alcanzó un récord histórico de exportaciones en el primer semestre de 2026',resumen:'Según un informe de la Bolsa de Comercio de Rosario, Argentina exportó 60,7 millones de toneladas de granos y subproductos entre enero y junio, el mayor volumen para ese período, con maíz en 21 Mt (+23% vs. promedio histórico) y trigo en 11,1 Mt (+63%). La soja, en cambio, cayó 3% interanual a 20,1 Mt equivalentes y tuvo su menor participación relativa (33%) en 26 años, mientras la cosecha de maíz alcanzaba apenas el 65% del área al 2 de julio, la más lenta en cinco campañas.',link:'https://www.ellitoral.com/campolitoral/agroindustria-argentina-exportaciones-record-maiz-trigo-soja-oleaginosas-cereales-bolsa-comercio-rosario-precios-internacionales-mercado-internacional-gea-bcr_0_9i2RcebMeZ.html'},
  {fecha:'2026-07-04',fuente:'Bolsa de Cereales de Buenos Aires',cultivo:'Trigo / Maíz / Soja',titulo:'El trigo recupera ritmo de siembra y se mantienen las proyecciones para soja y maíz',resumen:'El PAS de la BCBA ubicó la siembra de trigo en 80,9% de las 6,5 millones de hectáreas previstas, tras un avance semanal de 15,1 puntos porcentuales. La cosecha de soja llegó a 99,1% con rinde de 31,4 qq/ha y producción proyectada en 50,1 Mt, mientras el maíz avanzó a 52,9% con rinde de 81,5 qq/ha y una proyección de 64 Mt (+30,6% interanual); el sorgo cubre 69% con rinde de 42,7 qq/ha y 2,9 Mt esperadas, destacándose el centro-norte de Córdoba con 56,5 qq/ha. En trigo, solo un 30% del área transita desde expansión foliar en adelante, con un adelanto de 14,6 puntos porcentuales respecto al promedio histórico.',link:'https://www.ellitoral.com/campolitoral/trigo-soja-maiz-sorgo-bolsa-cereales-buenos-aires-condiciones-climaticas-exceso-humedad-campana-agricola-202627_0_zuDYLuEqIo.html'}

let newsCurrentFilter = 'todos';

function newsSetFilter(crop) {
  newsCurrentFilter = crop;
  ['todos','trigo','maiz','soja'].forEach(function(c) {
    var el = document.getElementById('nchip-' + c);
    if (el) el.classList.toggle('active', c === crop);
  });
  newsRender();
}

function newsRender() {
  var container = document.getElementById('news-container');
  if (!container) return;
  var countEl = document.getElementById('news-filter-count');
  var cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 7);

  var items = NEWS_DATA.filter(function(n) {
    var d = new Date(n.fecha);
    if (d < cutoff) return false;
    if (newsCurrentFilter === 'todos') return true;
    return n.cultivo.toLowerCase().indexOf(newsCurrentFilter) >= 0;
  });

  if (countEl) countEl.textContent = items.length + ' nota' + (items.length !== 1 ? 's' : '');

  if (items.length === 0) {
    container.innerHTML = '<div class="news-empty"><div class="icon">🌿</div><p>No hay noticias para el filtro seleccionado.</p></div>';
    return;
  }

  var html = '<div class="news-list">';
  var lastDate = '';

  items.forEach(function(n) {
    var colorClass = n.cultivo.indexOf('/') >= 0 ? 'c-multi'
      : n.cultivo.toLowerCase().indexOf('trigo') >= 0 ? 'c-trigo'
      : (n.cultivo.toLowerCase().indexOf('maíz') >= 0 || n.cultivo.toLowerCase().indexOf('maiz') >= 0) ? 'c-maiz'
      : n.cultivo.toLowerCase().indexOf('soja') >= 0 ? 'c-soja' : '';

    var tagClass = n.cultivo.indexOf('/') >= 0 ? 'ntag-multi'
      : n.cultivo.toLowerCase().indexOf('trigo') >= 0 ? 'ntag-trigo'
      : (n.cultivo.toLowerCase().indexOf('maíz') >= 0 || n.cultivo.toLowerCase().indexOf('maiz') >= 0) ? 'ntag-maiz'
      : n.cultivo.toLowerCase().indexOf('soja') >= 0 ? 'ntag-soja' : 'ntag-gen';

    var daysAgo = Math.floor((new Date() - new Date(n.fecha)) / 86400000);
    var age = daysAgo === 0 ? 'Hoy' : daysAgo === 1 ? 'Ayer' : 'Hace ' + daysAgo + ' días';
    var isFresh = daysAgo <= 1;

    if (n.fecha !== lastDate) {
      var label = daysAgo === 0 ? 'Hoy' : daysAgo === 1 ? 'Ayer'
        : new Date(n.fecha + 'T00:00:00').toLocaleDateString('es-AR', {weekday:'long', day:'numeric', month:'long'});
      html += '<div class="date-divider">' + label + '</div>';
      lastDate = n.fecha;
    }

    var resumen = n.resumen.length > 220 ? n.resumen.slice(0, 220).replace(/\s\S+$/, '') + '…' : n.resumen;

    html += '<div class="news-card ' + colorClass + '">'
      + '<div class="card-meta">'
      + '<span style="font-size:0.72rem;color:#999">' + n.fecha + '</span>'
      + '<span class="card-fuente">' + n.fuente + '</span>'
      + '<span class="card-cultivo ' + tagClass + '">' + n.cultivo + '</span>'
      + '<span class="age-badge' + (isFresh ? ' fresh' : '') + '">' + age + '</span>'
      + '</div>'
      + '<div class="card-titulo">' + n.titulo + '</div>'
      + '<div class="card-resumen">' + resumen + '</div>'
      + '<div class="card-footer"><a class="btn-ver-nota" href="' + n.link + '" target="_blank" rel="noopener">Ver nota →</a></div>'
      + '</div>';
  });

  html += '</div>';
  container.innerHTML = html;
}

function ipFmtNum(n,dec){if(n===null||n===undefined||isNaN(n))return'—';const neg=n<0;const parts=Math.abs(n).toFixed(dec).split('.');parts[0]=parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,'.');return(neg?'-':'')+parts.join(',');}
function ipLastPeriodLabel(crop){const ins=IP_DATA[crop].insumos[0];const keys=Object.keys(ins.series||{}).sort();if(!keys.length)return'';const months=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];const [y,mo]=keys[keys.length-1].split('-');return months[parseInt(mo)-1]+' '+y;}

function renderIpCropBar(){
  const crops=[['soja','🫘 Soja'],['maiz','🌽 Maíz'],['trigo','🌾 Trigo'],['ternero','🐄 Ternero'],['novillito','🐂 Novillito'],['leche','🥛 Leche']];
  document.getElementById('ip-crop-bar').innerHTML = crops.map(function(c){
    return '<button class="venc-btn '+(ipCrop===c[0]?'active':'')+'" onclick="selectIpCrop(\''+c[0]+'\')">'+c[1]+'</button>';
  }).join('');
}

function selectIpCrop(crop){
  ipCrop=crop; ipSelIdx=null; ipMode='1y'; ipRange=5;
  renderIpCropBar();
  renderIpCrop(crop);
}

function renderIpCrop(crop){
  const body=document.getElementById('ip-body');
  body.innerHTML = '<div class="full-card" id="ip-detail">'
    + '<div id="ip-dtitle" style="font-size:0.95rem;font-weight:700;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #f0f2f5"></div>'

    + '<div class="ip-range-bar" id="ip-range-bar"></div>'

    + '</div>'

  buildIpLists();

}

function renderIpRangeBar(){
  const el=document.getElementById('ip-range-bar');
  if(!el)return;
  const ranges=[[1,'1A'],[3,'3A'],[5,'5A'],[10,'10A'],[0,'Todo']];
  el.innerHTML = ranges.map(function(r){
    return '<button class="venc-btn '+(ipRange===r[0]?'active':'')+'" onclick="setIpRange('+r[0]+')">'+r[1]+'</button>';
  }).join('');
}

function setIpMode(m){ ipMode=m; renderIpCrop(ipCrop); }

function setIpRange(y){
  ipRange=y;
  renderIpRangeBar();
  if(ipSelIdx!==null) drawIpChart(ipCrop, IP_DATA[ipCrop].insumos[ipSelIdx]);
}

function buildIpLists(){
  const insumos=IP_DATA[ipCrop].insumos;
  function getV(i){ return ipMode==='1y'?i.var1y:i.var5y; }
  const G = insumos.filter(function(i){return getV(i)<0;}).sort(function(a,b){return getV(a)-getV(b);});
  const P = insumos.filter(function(i){return getV(i)>=0;}).sort(function(a,b){return getV(b)-getV(a);});
  renderIpList('g',G);
  renderIpList('p',P);
}

function renderIpList(panel, items){
  const el=document.getElementById('ip-list-'+panel);
  if(!el)return;
  if(!items.length){ el.innerHTML='<div style="padding:14px;color:#aaa;font-size:0.8rem;text-align:center">Ninguno</div>'; return; }
  const insumos=IP_DATA[ipCrop].insumos;
  el.innerHTML = items.map(function(ins){
    const idx=insumos.indexOf(ins);
    const v = ipMode==='1y'?ins.var1y:ins.var5y;
    const cls = v<0?'tna-pos':'tna-neg';
    const sel = ipSelIdx===idx?'sel':'';
    return '<div class="ip-row '+sel+'" onclick="showIpDetail('+idx+',true)">'
      + '<div style="display:flex;align-items:center;gap:10px"><span style="font-size:1.1rem;flex-shrink:0">'+ipIcon(ins)+'</span>'
      + '<div><div class="ip-name">'+ipEsc(ipDisplayName(ins))+'</div><div class="ip-desc">'+ipEsc(ins.desc)+'</div></div></div>'
      + '<span class="tna-badge '+cls+'">'+(v>=0?'+':'')+v.toFixed(1)+'%</span>'
      + '</div>';
  }).join('');
}

function showIpDetail(idx, scroll){
  ipSelIdx=idx;
  const ins=IP_DATA[ipCrop].insumos[idx];
    document.getElementById('ip-dtitle').innerHTML='<span style="margin-right:8px">'+ipIcon(ins)+'</span>'+ipEsc(ipDisplayName(ins));
  document.getElementById('ip-ddesc').textContent=ins.desc;
  const unit = ins.desc.indexOf('tn')>=0?'tn':'kg';
  const v1=ins.var1y, v5=ins.var5y;
  const abs1y = ins.last - (ins.last/(1+v1/100));
  const abs5y = ins.last - ins.avg5y;
  document.getElementById('ip-kpis').innerHTML =
      '<div class="kpi"><div class="label">Valor actual</div><div class="value">'+ipFmtNum(ins.last,2)+'</div><div class="sub">'+unit+' / unidad</div></div>'
    + '<div class="kpi '+(v1<0?'green':'red')+'"><div class="label">Var. vs 12 meses</div><div class="value">'+fmtPct(v1)+'</div><div class="sub">'+(abs1y>=0?'+':'')+ipFmtNum(abs1y,2)+' '+unit+'</div></div>'
    + '<div class="kpi '+(v5<0?'green':'red')+'"><div class="label">Var. vs prom. 5 años</div><div class="value">'+fmtPct(v5)+'</div><div class="sub">'+(abs5y>=0?'+':'')+ipFmtNum(abs5y,2)+' '+unit+'</div></div>'
    + '<div class="kpi yellow"><div class="label">Promedio 5 años</div><div class="value">'+ipFmtNum(ins.avg5y,2)+'</div><div class="sub">'+unit+' / unidad</div></div>';
  renderIpRangeBar();
  buildIpLists();
  setTimeout(function(){ drawIpChart(ipCrop, ins); }, 60);
  if(scroll) setTimeout(function(){ document.getElementById('ip-detail').scrollIntoView({behavior:'smooth',block:'nearest'}); },60);
}

function drawIpChart(crop, ins){
  if(ipChart){ ipChart.destroy(); ipChart=null; }
  const series=ins.series||{};
  let entries=Object.entries(series).sort(function(a,b){return a[0].localeCompare(b[0]);});
  if(ipRange>0){
    const cutoff=new Date(); cutoff.setFullYear(cutoff.getFullYear()-ipRange);
    const cutStr=cutoff.toISOString().slice(0,7);
    entries=entries.filter(function(e){return e[0]>=cutStr;});
  }
  if(!entries.length) return;
  const months=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const labels=entries.map(function(e){const p=e[0].split('-');return months[parseInt(p[1])-1]+' '+p[0].slice(2);});
  const values=entries.map(function(e){return e[1];});
  const avg=values.reduce(function(a,b){return a+b;},0)/values.length;
  const ctx=document.getElementById('ip-chart').getContext('2d');
  ipChart=new Chart(ctx,{
    type:'line',
    data:{labels:labels, datasets:[
      {label:ipDisplayName(ins), data:values, borderColor:'#1a1a2e',
        segment:{borderColor:function(c){const mid=(c.p0.parsed.y+c.p1.parsed.y)/2; return mid<=avg?'#1e7e34':'#9b1c1c';}},
        backgroundColor:'rgba(26,26,46,0.05)', borderWidth:2.5, pointRadius:0, pointHoverRadius:4, tension:0.3, fill:false},
      {label:'Prom. período', data:Array(labels.length).fill(avg), borderColor:'#aab', borderWidth:1.5, borderDash:[5,4], pointRadius:0, fill:false}
    ]},
    options:{responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:true,position:'top',labels:{boxWidth:12,font:{size:11},padding:10}},
        tooltip:{callbacks:{label:function(c){return ' '+c.dataset.label+': '+ipFmtNum(c.raw,2);}}}},
      scales:{x:{grid:{display:false},ticks:{font:{size:10},maxTicksLimit:12,maxRotation:0}},
        y:{grid:{color:'#f0f2f5'},ticks:{font:{size:10},callback:function(v){return ipFmtNum(v, v%1===0?0:2);}}}}}
  });
}
